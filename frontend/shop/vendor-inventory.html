<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Vendor Inventory — Bowenstreet Market</title>
<meta id="meta-desc" name="description" content="Browse this vendor's inventory at Bowenstreet Market — handcrafted, vintage, and antique goods in Oshkosh, Wisconsin.">
<link rel="icon" type="image/webp" href="/static/images/favicon.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #38383B; --bg-card: #3a3a3e; --bg-dark: #1a1a1c;
    --accent: #A8A6A1; --accent-lt: #C5C3BE; --text: #F0EDE8; --text-dim: #A8A6A1;
    --gold: #C9A96E; --gold-dim: rgba(201,169,110,0.22); --border: #4A4A4D;
    --warm-border: rgba(201,169,110,0.22);
  }
  html { scroll-behavior: smooth; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(201,169,110,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 15% 100%, rgba(168,166,161,0.04) 0%, transparent 50%);
    background-attachment: fixed;
    color: var(--text); font-family: 'Roboto', sans-serif; font-weight: 300;
    min-height: 100vh; line-height: 1.7;
  }
  .site-header {
    background: var(--bg-dark);
    background-image: radial-gradient(ellipse at 50% 100%, rgba(201,169,110,0.08) 0%, transparent 65%);
    border-top: 3px solid transparent;
    border-image: repeating-linear-gradient(90deg, rgba(201,169,110,0.0) 0px, rgba(201,169,110,0.25) 2px, rgba(201,169,110,0.0) 4px) 3;
    border-bottom: 1px solid rgba(201,169,110,0.12);
    padding: 2.5rem 1.5rem 1.5rem; text-align: center; animation: fadeIn 0.5s ease;
  }
  .site-header h1 {
    font-family: 'EB Garamond', serif; font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 500; letter-spacing: 0.04em; color: var(--text); font-style: italic;
  }
  .vendor-badge {
    display: inline-block; background: var(--gold); color: var(--bg-dark);
    font-size: 0.65rem; font-weight: 500; padding: 0.15rem 0.5rem;
    letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.5rem;
  }
  .header-rule { width: 56px; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,169,110,0.55), transparent); margin: 1rem auto 0; }
  .nav-links {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 0.8rem;
  }
  .nav-links a {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em;
    color: #A8A6A1; text-decoration: none; padding: 0.3rem 0;
    border-bottom: 1px solid transparent; transition: all 0.2s;
  }
  .nav-links a:hover { color: #C9A96E; border-bottom-color: #C9A96E; }
  .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }
  .inventory-header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem;
  }
  .inventory-header h2 {
    font-family: 'EB Garamond', serif; font-style: italic; font-size: 1.4rem; color: var(--text);
  }
  .inventory-count { font-size: 0.78rem; color: var(--text-dim); }
  .inventory-controls { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .inventory-search {
    flex: 1; min-width: 180px; background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text); padding: 0.5rem 0.75rem; font-size: 0.82rem;
    font-family: 'Roboto', sans-serif; outline: none; transition: border-color 0.2s;
  }
  .inventory-search:focus { border-color: var(--gold); }
  .inventory-search::placeholder { color: var(--text-dim); }
  .inventory-select {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
    padding: 0.5rem 0.75rem; font-size: 0.82rem; font-family: 'Roboto', sans-serif;
    outline: none; cursor: pointer;
  }
  .inventory-select:focus { border-color: var(--gold); }
  .category-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
  .cat-pill {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim);
    font-size: 0.7rem; padding: 0.3rem 0.7rem; cursor: pointer;
    transition: all 0.2s; text-transform: capitalize;
  }
  .cat-pill:hover, .cat-pill.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .items-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.75rem; animation: fadeUp 0.4s ease both;
  }
  .item-card {
    background: var(--bg-card); border: 1px solid var(--border);
    overflow: hidden; transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
  }
  .item-card:hover { border-color: var(--gold); transform: translateY(-2px); }
  .item-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: var(--bg-dark); }
  .item-card-body { padding: 0.6rem 0.75rem; }
  .item-card-name {
    font-size: 0.8rem; color: var(--text); margin-bottom: 0.15rem;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .item-card-price { font-size: 0.85rem; color: var(--gold); font-weight: 400; }
  .item-card-category { font-size: 0.65rem; color: var(--text-dim); margin-top: 0.15rem; text-transform: capitalize; }
  .item-card-actions { padding: 0 0.75rem 0.75rem; }
  .item-card-btn {
    width: 100%;
    background: var(--gold);
    border: 1px solid var(--gold);
    color: var(--bg-dark);
    padding: 0.55rem 0.75rem;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .item-card-btn.in-cart {
    background: transparent;
    border-color: var(--gold);
    color: var(--gold);
  }
  .item-card-btn.disabled {
    background: transparent;
    border-color: var(--border);
    color: var(--text-dim);
    cursor: default;
  }
  .item-card-offline {
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 0.2rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .cart-bar {
    position: sticky;
    bottom: 1rem;
    z-index: 15;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-top: 1.25rem;
    padding: 1rem 1.2rem;
    background: rgba(26, 26, 28, 0.95);
    border: 1px solid var(--warm-border);
  }
  .cart-bar.visible { display: flex; }
  .cart-bar-copy { display: flex; flex-direction: column; gap: 0.15rem; }
  .cart-bar-title { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); }
  .cart-bar-meta { font-size: 0.92rem; color: var(--text); }
  .cart-bar-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }
  .cart-link-btn {
    background: var(--gold);
    border: 1px solid var(--gold);
    color: var(--bg-dark);
    text-decoration: none;
    padding: 0.6rem 1rem;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .cart-link-btn.secondary {
    background: transparent;
    color: var(--text);
    border-color: var(--border);
  }
  .pagination { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
  .page-btn {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
    padding: 0.4rem 0.8rem; font-size: 0.78rem; cursor: pointer;
    transition: all 0.2s; font-family: 'Roboto', sans-serif;
  }
  .page-btn:hover { border-color: var(--gold); color: var(--gold); }
  .page-btn:disabled { opacity: 0.4; cursor: default; }
  .page-btn:disabled:hover { border-color: var(--border); color: var(--text); }
  .page-info { font-size: 0.75rem; color: var(--text-dim); }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-dim); font-size: 0.85rem; }
  .loading-state { text-align: center; padding: 3rem; color: var(--text-dim); font-size: 0.85rem; }
  .error-state { text-align: center; padding: 4rem 1.5rem; }
  .error-state h2 { font-family: 'EB Garamond', serif; font-style: italic; font-size: 1.5rem; color: var(--text); margin-bottom: 0.5rem; }
  .error-state p { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 1rem; }
  .error-state a { color: var(--gold); text-decoration: none; font-size: 0.85rem; }
  .market-info {
    margin-top: 3rem; padding: 1.5rem; background: var(--bg-dark);
    border: 1px solid var(--warm-border); text-align: center;
  }
  .market-info h3 { font-family: 'EB Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; }
  .market-info p { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.2rem; }
  .market-info a { color: var(--gold); text-decoration: none; }
  @media (max-width: 600px) {
    .items-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .cart-bar {
      position: fixed;
      left: 1rem;
      right: 1rem;
      bottom: 1rem;
      flex-direction: column;
      align-items: stretch;
    }
    .cart-bar-actions a { text-align: center; }
  }
</style>
</head>
<body>

<div id="loading" class="loading-state">Loading vendor inventory...</div>
<div id="error" class="error-state" style="display:none"></div>
<div id="page-content" style="display:none">
  <header class="site-header">
    <h1 id="vendor-name"></h1>
    <div class="vendor-badge" id="vendor-badge"></div>
    <div class="header-rule"></div>
    <div class="nav-links">
      <a href="/shop/index.html">Shop</a>
      <a href="/shop/booths.html">Booths</a>
      <a href="/shop/classes.html">Classes</a>
    </div>
  </header>

  <div class="container">
    <div class="inventory-header">
      <h2>Inventory</h2>
      <span class="inventory-count" id="inventory-count"></span>
    </div>
    <div class="inventory-controls">
      <input type="text" class="inventory-search" id="inv-search" placeholder="Search items..." oninput="debounceSearch()">
      <select class="inventory-select" id="inv-sort" onchange="loadInventory(1)">
        <option value="newest">Newest</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
        <option value="name">Name A-Z</option>
      </select>
    </div>
    <div class="category-pills" id="category-pills"></div>
    <div class="cart-bar" id="cart-bar">
      <div class="cart-bar-copy">
        <span class="cart-bar-title">Pickup Cart</span>
        <span class="cart-bar-meta" id="cart-bar-meta">0 items selected</span>
      </div>
      <div class="cart-bar-actions">
        <a href="/shop/index.html?cart=open#collection-start" class="cart-link-btn secondary">View Cart</a>
        <a href="/shop/index.html?cart=open#collection-start" class="cart-link-btn">Checkout</a>
      </div>
    </div>
    <div id="items-grid" class="items-grid"></div>
    <div id="inv-empty" class="empty-state" style="display:none">No items found.</div>
    <div id="inv-pagination" class="pagination" style="display:none">
      <button class="page-btn" id="prev-btn" onclick="loadInventory(currentPage-1)">&laquo; Prev</button>
      <span class="page-info" id="page-info"></span>
      <button class="page-btn" id="next-btn" onclick="loadInventory(currentPage+1)">Next &raquo;</button>
    </div>

    <div class="market-info">
      <h3>Visit Us at Bowenstreet Market</h3>
      <p>2837 Bowen St, Oshkosh, WI 54901</p>
      <p>Tue&ndash;Sat 10am&ndash;6pm &nbsp;&middot;&nbsp; Sun 11am&ndash;4pm</p>
      <p style="margin-top:0.5rem"><a href="/shop/booths.html">Explore all vendor booths &rarr;</a></p>
    </div>
  </div>
</div>

<script>
function escHtml(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
var CART_STORAGE_KEY = 'bmm_shop_cart_v1';

var vendorId = null;
var currentPage = 1;
var totalPages = 1;
var searchTimeout = null;
var activeCategory = '';
var PER_PAGE = 24;
var currentItems = [];

function loadCartState() {
  try {
    var raw = localStorage.getItem(CART_STORAGE_KEY);
    var parsed = raw ? JSON.parse(raw) : {};
    return parsed && typeof parsed === 'object' ? parsed : {};
  } catch (_) {
    return {};
  }
}

function saveCartState(cart) {
  localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cart));
}

function cartHasItem(itemId) {
  var cart = loadCartState();
  return Object.prototype.hasOwnProperty.call(cart, String(itemId));
}

function addToCart(item) {
  var cart = loadCartState();
  cart[String(item.id)] = {
    id: item.id,
    name: item.name,
    description: item.description || '',
    price: item.price,
    sale_price: item.sale_price,
    category: item.category || '',
    booth_number: item.booth_number || '',
    image_path: item.image_path || '',
    photo_url: item.photo_url || ''
  };
  saveCartState(cart);
  updateCartBar();
  renderItems();
}

function updateCartBar() {
  var cart = loadCartState();
  var items = Object.values(cart);
  var bar = document.getElementById('cart-bar');
  var meta = document.getElementById('cart-bar-meta');
  if (!items.length) {
    bar.classList.remove('visible');
    meta.textContent = '0 items selected';
    return;
  }
  var total = items.reduce(function(sum, item) {
    var base = (item.sale_price != null && Number(item.sale_price) > 0 && Number(item.sale_price) < Number(item.price))
      ? Number(item.sale_price)
      : Number(item.price);
    return sum + (base * 1.05);
  }, 0);
  bar.classList.add('visible');
  meta.textContent = items.length + ' items · est. total $' + total.toFixed(2);
}

function openItem(itemId) {
  window.location.href = '/shop/index.html?item=' + encodeURIComponent(itemId) + '#collection-start';
}

function renderItems() {
  var items = currentItems || [];
  var grid = document.getElementById('items-grid');
  var emptyEl = document.getElementById('inv-empty');

  if (items.length === 0) {
    grid.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }

  emptyEl.style.display = 'none';
  grid.innerHTML = items.map(function(item) {
    var imgUrl = item.image_path || item.photo_url;
    var imgHtml = imgUrl
      ? '<img src="' + escHtml(imgUrl) + '" alt="' + escHtml(item.name) + '" loading="lazy" onerror="this.onerror=null;this.src=\'/static/images/placeholder-booth.jpg\'">'
      : '<img src="/static/images/placeholder-booth.jpg" alt="" loading="lazy">';
    var priceHtml = '$' + Number(item.price).toFixed(2);
    if (item.sale_price) {
      priceHtml = '<span style="text-decoration:line-through;color:var(--text-dim);font-size:0.75rem">$' + Number(item.price).toFixed(2) + '</span> <span style="color:#e07070">$' + Number(item.sale_price).toFixed(2) + '</span>';
    }
    var isOnline = !!item.is_online;
    var inCart = isOnline && cartHasItem(item.id);
    var buttonLabel = !isOnline ? 'In Store Only' : (inCart ? 'In Cart' : 'Add to Cart');
    var buttonClass = !isOnline ? 'item-card-btn disabled' : (inCart ? 'item-card-btn in-cart' : 'item-card-btn');
    var offlineHtml = !isOnline ? '<div class="item-card-offline">Not available for online checkout</div>' : '';
    return '<div class="item-card" data-item-id="' + item.id + '">' + imgHtml +
      '<div class="item-card-body">' +
      '<div class="item-card-name">' + escHtml(item.name) + '</div>' +
      '<div class="item-card-price">' + priceHtml + '</div>' +
      (item.category ? '<div class="item-card-category">' + escHtml(item.category) + '</div>' : '') +
      offlineHtml +
      '</div>' +
      '<div class="item-card-actions"><button type="button" class="' + buttonClass + '" data-add-cart-id="' + item.id + '">' + buttonLabel + '</button></div>' +
      '</div>';
  }).join('');

  grid.querySelectorAll('.item-card').forEach(function(card) {
    card.addEventListener('click', function(e) {
      if (e.target.closest('[data-add-cart-id]')) return;
      var itemId = parseInt(this.getAttribute('data-item-id'), 10);
      var item = currentItems.find(function(entry) { return entry.id === itemId; });
      if (!item || !item.is_online) return;
      openItem(itemId);
    });
  });
  grid.querySelectorAll('[data-add-cart-id]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var itemId = parseInt(this.getAttribute('data-add-cart-id'), 10);
      var item = currentItems.find(function(entry) { return entry.id === itemId; });
      if (!item) return;
      if (!item.is_online) return;
      if (cartHasItem(itemId)) {
        window.location.href = '/shop/index.html?cart=open#collection-start';
        return;
      }
      addToCart(item);
    });
  });
}

function getVendorId() {
  var parts = window.location.pathname.split('/');
  return parseInt(parts[parts.length - 1]) || null;
}

function debounceSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(function() { loadInventory(1); }, 300);
}

async function loadInventory(page) {
  if (!vendorId) return;
  currentPage = page;
  var search = document.getElementById('inv-search').value.trim();
  var sort = document.getElementById('inv-sort').value;
  var params = new URLSearchParams({ sort: sort, page: page, per_page: PER_PAGE });
  if (search) params.set('search', search);
  if (activeCategory) params.set('category', activeCategory);

  try {
    var resp = await fetch('/api/v1/storefront/vendor-inventory/' + vendorId + '?' + params.toString());
    if (resp.status === 404) { showError(); return; }
    if (!resp.ok) throw new Error('Failed');
    var data = await resp.json();

    if (page === 1 && !document.getElementById('vendor-name').textContent) {
      document.getElementById('vendor-name').textContent = data.vendor_name || 'Vendor';
      document.getElementById('vendor-badge').textContent = data.booth_number ? 'Booth ' + data.booth_number : 'Vendor';
      document.getElementById('vendor-badge').style.display = data.booth_number ? 'inline-block' : 'none';
      document.title = (data.vendor_name || 'Vendor') + ' Inventory — Bowenstreet Market';
    }

    var items = data.items || [];
    items = items.map(function(item) {
      item.booth_number = data.booth_number || '';
      return item;
    });
    var total = data.total || 0;
    totalPages = Math.ceil(total / PER_PAGE) || 1;

    document.getElementById('inventory-count').textContent = total + ' item' + (total !== 1 ? 's' : '');

    currentItems = items;

    renderItems();

    var pagEl = document.getElementById('inv-pagination');
    if (totalPages > 1) {
      pagEl.style.display = 'flex';
      document.getElementById('prev-btn').disabled = (currentPage <= 1);
      document.getElementById('next-btn').disabled = (currentPage >= totalPages);
      document.getElementById('page-info').textContent = 'Page ' + currentPage + ' of ' + totalPages;
    } else {
      pagEl.style.display = 'none';
    }
  } catch (err) {
    document.getElementById('items-grid').innerHTML = '<div class="empty-state">Unable to load inventory.</div>';
  }
}

async function loadCategories() {
  if (!vendorId) return;
  try {
    var resp = await fetch('/api/v1/storefront/categories?vendor_id=' + vendorId + '&format=simple');
    if (!resp.ok) return;
    var cats = await resp.json();
    if (!cats || cats.length === 0) return;
    var pillsEl = document.getElementById('category-pills');
    pillsEl.innerHTML = '';
    var allPill = document.createElement('span');
    allPill.className = 'cat-pill active';
    allPill.textContent = 'All';
    allPill.addEventListener('click', function() { filterCategory(this, ''); });
    pillsEl.appendChild(allPill);
    cats.forEach(function(c) {
      var pill = document.createElement('span');
      pill.className = 'cat-pill';
      pill.textContent = c;
      pill.addEventListener('click', function() { filterCategory(this, c); });
      pillsEl.appendChild(pill);
    });
  } catch (e) {}
}

function filterCategory(el, cat) {
  activeCategory = cat;
  var pills = document.querySelectorAll('.cat-pill');
  pills.forEach(function(p) { p.classList.remove('active'); });
  el.classList.add('active');
  loadInventory(1);
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('page-content').style.display = 'none';
  var el = document.getElementById('error');
  el.innerHTML = '<h2>Vendor Not Found</h2><p>This vendor does not exist or is not currently active.</p><a href="/shop/booths.html">&larr; Browse all vendor booths</a>';
  el.style.display = 'block';
}

async function init() {
  vendorId = getVendorId();
  if (!vendorId) { showError(); return; }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('page-content').style.display = 'block';

  loadInventory(1);
  loadCategories();
  updateCartBar();
}

init();
</script>
</body>
</html>
