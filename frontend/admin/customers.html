<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Directory — BMM-POS</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="icon" type="image/webp" href="/static/images/favicon.webp">
    <style>
        /* ── Page subtitle ─────────────────────────────────────────── */
        .page-subtitle {
            font-family: 'EB Garamond', Georgia, serif;
            font-style: italic;
            font-size: 0.95rem;
            color: var(--text-light);
            font-weight: 400;
            margin-top: 0.25rem;
            letter-spacing: 0.01em;
        }

        .search-bar { margin-bottom: 1rem; }
        .search-bar .form-control {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            transition: border-color 0.15s;
        }
        .search-bar .form-control:focus {
            border-color: var(--gold-dim);
            box-shadow: 0 0 0 2px rgba(201,169,110,0.12);
        }
        .vendor-row { cursor: pointer; }
        .vendor-row:hover td { background: rgba(201,169,110,0.04) !important; }
        .vendor-expand { display:none; background: var(--surface-2); }
        .vendor-expand.open { display:table-row; }
        .expand-inner { padding: 1rem 1.5rem; }
        .expand-tabs { display:flex; gap:0.5rem; margin-bottom:1rem; border-bottom:1px solid var(--border); }
        .expand-tab { background:none; border:none; color:var(--text-light); padding:0.5rem 1rem; cursor:pointer; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.06em; border-bottom:2px solid transparent; margin-bottom:-1px; font-family: 'Roboto', sans-serif; }
        .expand-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
        .expand-tab:hover { color: var(--text); }
        .expand-panel { display:none; }
        .expand-panel.active { display:block; }
        .mini-table { width:100%; border-collapse:collapse; font-size:0.8rem; }
        .mini-table th { padding:0.4rem 0.5rem; text-align:left; color:var(--text-light); font-size:0.7rem; text-transform:uppercase; letter-spacing:0.06em; border-bottom:1px solid var(--border); }
        .mini-table td { padding:0.4rem 0.5rem; border-bottom:1px solid rgba(255,255,255,0.05); }
        .mini-table tr:last-child td { border-bottom:none; }
        .expand-arrow { display:inline-block; transition:transform 0.2s; color: var(--gold-dim); }
        .expand-arrow.open { transform:rotate(90deg); }
        .balance-tag { font-weight:700; color:var(--success); font-family: 'EB Garamond', serif; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="#" id="nav-home" class="navbar-brand">
        <img src="/static/images/logo.webp" alt="Bowenstreet Market" class="navbar-logo">
        <span class="store-name" id="nav-role-label">Customers</span>
    </a>
    <div class="navbar-user">
        <span id="user-name">Loading...</span>
        <nav class="navbar-nav" id="nav-links">
            <a href="/vendor/items.html">Items</a>
            <a href="/admin/customers.html" class="active">Vendors</a>
            <a href="#" onclick="handleLogout()">Logout</a>
        </nav>
    </div>
</nav>
<div class="main-content">
    <div id="alert-container"></div>
    <div class="page-header">
        <h1 class="page-title">Vendor Directory</h1>
        <p class="page-subtitle">Search and browse all vendor accounts and activity</p>
        <span id="vendor-count" class="badge badge-gray"></span>
    </div>

    <div class="ornament">&loz;</div>

    <div class="card search-bar">
        <input class="form-control" type="text" id="search-input"
            placeholder="Search by name, email, or booth number..."
            oninput="filterVendors()" style="max-width:420px">
    </div>

    <div class="card" style="padding:0">
        <div class="table-wrapper">
            <table id="vendors-table">
                <thead>
                    <tr>
                        <th style="width:24px"></th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Booth</th>
                        <th>Phone</th>
                        <th>Balance</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="vendors-tbody">
                    <tr><td colspan="7" class="loading">Loading vendors...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script>
    let allVendors = [];
    let expandedVendorId = null;

    function handleLogout() {
        clearToken();
        window.location.href = '/vendor/login.html';
    }

    function filterVendors() {
        const q = document.getElementById('search-input').value.toLowerCase().trim();
        const rows = document.querySelectorAll('.vendor-main-row');
        rows.forEach(row => {
            const text = row.dataset.searchText || '';
            const expRow = document.getElementById(`exp-${row.dataset.vid}`);
            const show = !q || text.includes(q);
            row.style.display = show ? '' : 'none';
            if (expRow) expRow.style.display = 'none';
        });
    }

    async function toggleExpand(vid) {
        const expRow = document.getElementById(`exp-${vid}`);
        const arrow = document.getElementById(`arrow-${vid}`);
        const isOpen = expRow.classList.contains('open');

        document.querySelectorAll('.vendor-expand').forEach(r => r.classList.remove('open'));
        document.querySelectorAll('.expand-arrow').forEach(a => a.classList.remove('open'));

        if (isOpen) return;

        expRow.classList.add('open');
        arrow.classList.add('open');
        expandedVendorId = vid;

        await loadVendorDetails(vid);
    }

    function switchTab(vid, tab) {
        document.querySelectorAll(`#exp-${vid} .expand-tab`).forEach(t => t.classList.remove('active'));
        document.querySelectorAll(`#exp-${vid} .expand-panel`).forEach(p => p.classList.remove('active'));
        document.getElementById(`tab-${vid}-${tab}`).classList.add('active');
        document.getElementById(`panel-${vid}-${tab}`).classList.add('active');
    }

    async function loadVendorDetails(vid) {
        const itemsPanel = document.getElementById(`panel-${vid}-items`);
        const salesPanel = document.getElementById(`panel-${vid}-sales`);

        itemsPanel.innerHTML = '<p class="loading">Loading items...</p>';
        salesPanel.innerHTML = '<p class="loading">Loading sales...</p>';

        try {
            const [items, sales] = await Promise.all([
                apiGet(`/api/v1/items/?vendor_id=${vid}&status=active`),
                apiGet(`/api/v1/sales/?vendor_id=${vid}&limit=5`),
            ]);

            if (items.length === 0) {
                itemsPanel.innerHTML = '<p class="empty-state" style="padding:1rem 0">No active items.</p>';
            } else {
                itemsPanel.innerHTML = `<table class="mini-table">
                    <thead><tr><th>Name</th><th>SKU</th><th>Price</th><th>Qty</th><th>Status</th></tr></thead>
                    <tbody>${items.map(i => `<tr>
                        <td>${i.name}</td>
                        <td><small>${i.sku}</small></td>
                        <td>$${parseFloat(i.active_price || i.price).toFixed(2)}</td>
                        <td>${i.quantity}</td>
                        <td><span class="badge ${i.status === 'active' ? 'badge-green' : 'badge-gray'}">${i.status}</span></td>
                    </tr>`).join('')}</tbody>
                </table>`;
            }

            if (sales.length === 0) {
                salesPanel.innerHTML = '<p class="empty-state" style="padding:1rem 0">No recent sales.</p>';
            } else {
                salesPanel.innerHTML = `<table class="mini-table">
                    <thead><tr><th>Date</th><th>Sale #</th><th>Items</th><th>Amount</th><th>Payment</th></tr></thead>
                    <tbody>${sales.map(s => {
                        const d = new Date(s.created_at);
                        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                        return `<tr>
                            <td>${dateStr}</td>
                            <td>#${s.id}</td>
                            <td>${(s.line_items || []).length}</td>
                            <td>$${parseFloat(s.total).toFixed(2)}</td>
                            <td>${s.payment_method}</td>
                        </tr>`;
                    }).join('')}</tbody>
                </table>`;
            }
        } catch (e) {
            itemsPanel.innerHTML = `<p class="alert alert-error">${e.message}</p>`;
            salesPanel.innerHTML = '';
        }
    }

    function renderVendors(vendors) {
        const tbody = document.getElementById('vendors-tbody');
        const vendorList = vendors.filter(v => v.role === 'vendor');
        document.getElementById('vendor-count').textContent = `${vendorList.length} vendors`;

        if (vendorList.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No vendors found.</td></tr>';
            return;
        }

        tbody.innerHTML = vendorList.map(v => {
            const searchText = `${v.name} ${v.email} ${v.booth_number || ''}`.toLowerCase();
            const balance = v.current_balance != null ? `$${parseFloat(v.current_balance).toFixed(2)}` : '$0.00';
            const statusClass = v.status === 'active' ? 'badge-green' : 'badge-red';
            return `
            <tr class="vendor-main-row vendor-row" data-vid="${v.id}" data-search-text="${searchText}" onclick="toggleExpand(${v.id})">
                <td><span class="expand-arrow" id="arrow-${v.id}">&#9654;</span></td>
                <td><strong>${v.name}</strong></td>
                <td>${v.email}</td>
                <td>${v.booth_number || '—'}</td>
                <td>${v.phone || '—'}</td>
                <td><span class="balance-tag">${balance}</span></td>
                <td><span class="badge ${statusClass}">${v.status}</span></td>
            </tr>
            <tr class="vendor-expand" id="exp-${v.id}">
                <td colspan="7">
                    <div class="expand-inner">
                        <div class="expand-tabs">
                            <button class="expand-tab active" id="tab-${v.id}-items" onclick="event.stopPropagation();switchTab(${v.id},'items')">Items</button>
                            <button class="expand-tab" id="tab-${v.id}-sales" onclick="event.stopPropagation();switchTab(${v.id},'sales')">Recent Sales</button>
                        </div>
                        <div class="expand-panel active" id="panel-${v.id}-items"></div>
                        <div class="expand-panel" id="panel-${v.id}-sales"></div>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    async function init() {
        const token = sessionStorage.getItem('bmm_token');
        if (!token) { window.location.href = '/vendor/login.html'; return; }
        const payload = parseToken();
        if (!payload || !['admin', 'cashier'].includes(payload.role)) {
            window.location.href = '/vendor/login.html'; return;
        }

        const role = payload.role;
        document.getElementById('user-name').textContent = payload.name || 'User';
        document.getElementById('nav-role-label').textContent = role === 'admin' ? 'Admin' : 'Cashier';
        document.getElementById('nav-home').href = role === 'admin' ? '/admin/index.html' : '/pos/index.html';

        if (role === 'admin') {
            document.getElementById('nav-links').innerHTML = `
                <a href="/admin/index.html">Dashboard</a>
                <a href="/admin/vendors.html">Manage Vendors</a>
                <a href="/vendor/items.html">Items</a>
                <a href="/admin/customers.html" class="active">Vendor Directory</a>
                <a href="#" onclick="handleLogout()">Logout</a>`;
        }

        try {
            allVendors = await apiGet('/api/v1/vendors/');
            renderVendors(allVendors);
        } catch (e) {
            showAlert('alert-container', e.message, 'error');
        }
    }

    init();
</script>
</body>
</html>
