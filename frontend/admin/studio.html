<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Studio Classes — BMM-POS Admin</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="icon" type="image/webp" href="/static/images/favicon.webp">
    <style>
        .calendar-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
        }
        .calendar-header h2 {
            font-family: 'EB Garamond', serif; font-style: italic;
            font-size: 1.6rem; color: var(--text); margin: 0;
        }
        .calendar-nav {
            display: flex; align-items: center; gap: 0.75rem;
        }
        .calendar-nav button {
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            padding: 0.4rem 0.9rem; cursor: pointer; font-size: 0.8rem;
            font-family: 'Roboto', sans-serif; transition: border-color 0.2s;
        }
        .calendar-nav button:hover { border-color: var(--gold); color: var(--gold); }
        .calendar-nav .month-label {
            font-family: 'EB Garamond', serif; font-style: italic;
            font-size: 1.2rem; min-width: 160px; text-align: center;
        }
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
            background: var(--border); border: 1px solid var(--border);
        }
        .cal-day-header {
            background: var(--charcoal-deep); padding: 0.5rem; text-align: center;
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
            color: var(--text-light); font-family: 'Roboto', sans-serif;
        }
        .cal-day {
            background: var(--surface); min-height: 100px; padding: 0.4rem;
            position: relative; cursor: pointer; transition: background 0.15s;
        }
        .cal-day:hover { background: var(--gold-glow); }
        .cal-day.other-month { background: var(--charcoal-deep); opacity: 0.4; }
        .cal-day.today { border: 2px solid var(--gold); }
        .cal-day-num {
            font-size: 0.75rem; color: var(--text-light); margin-bottom: 0.25rem;
            font-weight: 500;
        }
        .cal-event {
            font-size: 0.65rem; background: color-mix(in srgb, var(--gold) 18%, transparent);
            border-left: 2px solid var(--gold); padding: 2px 4px; margin-bottom: 2px;
            color: var(--text); cursor: pointer; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap; transition: background 0.15s;
        }
        .cal-event:hover { background: color-mix(in srgb, var(--gold) 35%, transparent); }
        .cal-event.cancelled {
            border-left-color: var(--danger); background: color-mix(in srgb, var(--danger) 12%, transparent);
            text-decoration: line-through; opacity: 0.6;
        }
        .cal-event.full {
            border-left-color: var(--warning); background: color-mix(in srgb, var(--warning) 12%, transparent);
        }

        .add-class-btn {
            background: var(--gold); color: var(--charcoal-deep); border: none;
            padding: 0.5rem 1.25rem; font-size: 0.72rem; letter-spacing: 0.1em;
            text-transform: uppercase; cursor: pointer; font-family: 'Roboto', sans-serif;
            font-weight: 500; transition: background 0.2s;
        }
        .add-class-btn:hover { background: var(--gold-light); }

        .class-modal-overlay {
            display: none; position: fixed; inset: 0; background: color-mix(in srgb, black 65%, transparent);
            z-index: 300; align-items: center; justify-content: center;
        }
        .class-modal-overlay.open { display: flex; }
        .class-modal {
            background: var(--surface); border: 1px solid var(--border);
            width: 90%; max-width: 520px; max-height: 90vh; overflow-y: auto;
            padding: 2rem;
        }
        .class-modal h3 {
            font-family: 'EB Garamond', serif; font-style: italic;
            font-size: 1.3rem; margin-bottom: 1.25rem; color: var(--text);
        }
        .fm-group { margin-bottom: 0.85rem; }
        .fm-group label {
            display: block; font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 0.12em; color: var(--text-light); margin-bottom: 0.3rem;
            font-family: 'Roboto', sans-serif;
        }
        .fm-group input, .fm-group textarea, .fm-group select {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 0.55rem 0.7rem; font-size: 0.85rem;
            font-family: 'Roboto', sans-serif;
        }
        .fm-group input:focus, .fm-group textarea:focus, .fm-group select:focus {
            outline: none; border-color: var(--gold);
        }
        .fm-group textarea { resize: vertical; min-height: 70px; }
        .fm-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .fm-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
        .fm-check {
            display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
            font-size: 0.8rem; color: var(--text);
        }
        .modal-actions {
            display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.25rem;
        }
        .modal-actions button {
            padding: 0.5rem 1.25rem; font-size: 0.72rem; letter-spacing: 0.1em;
            text-transform: uppercase; cursor: pointer; font-family: 'Roboto', sans-serif;
            font-weight: 500; border: none;
        }
        .btn-cancel { background: var(--bg); color: var(--text-light); border: 1px solid var(--border) !important; }
        .btn-cancel:hover { border-color: var(--text-light) !important; }
        .btn-save { background: var(--gold); color: var(--charcoal-deep); }
        .btn-save:hover { background: var(--gold-light); }
        .btn-delete { background: var(--danger); color: var(--white); }
        .btn-delete:hover { background: color-mix(in srgb, var(--danger) 85%, var(--white)); }
        #form-error { color: var(--danger); font-size: 0.8rem; min-height: 18px; margin-top: 0.5rem; }

        .stats-row {
            display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
        }
        .stat-pill {
            background: var(--surface); border: 1px solid var(--border);
            padding: 0.6rem 1.2rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .stat-pill .sp-num {
            font-family: 'EB Garamond', serif; font-size: 1.5rem; color: var(--text); font-weight: 500;
        }
        .stat-pill .sp-label {
            font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--text-light); font-family: 'Roboto', sans-serif;
        }

        .list-view { margin-top: 1.5rem; }
        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.85rem 1rem; background: var(--surface); border: 1px solid var(--border);
            margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.5rem;
        }
        .list-item:hover { border-color: var(--warm-border); }
        .li-main { flex: 1; min-width: 200px; }
        .li-title { font-size: 0.95rem; color: var(--text); font-weight: 400; }
        .li-meta {
            font-size: 0.72rem; color: var(--text-light); margin-top: 0.15rem;
        }
        .li-right { display: flex; align-items: center; gap: 1rem; }
        .li-badge {
            font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;
            padding: 0.2rem 0.6rem; font-weight: 500;
        }
        .badge-open { background: color-mix(in srgb, var(--success-light) 15%, transparent); color: var(--success-light); }
        .badge-full { background: color-mix(in srgb, var(--warning) 15%, transparent); color: var(--warning); }
        .badge-cancelled { background: color-mix(in srgb, var(--danger) 15%, transparent); color: var(--danger); }
        .badge-past { background: color-mix(in srgb, var(--text-light) 15%, transparent); color: var(--text-light); }
        .li-action {
            background: none; border: 1px solid var(--border); color: var(--text-light);
            padding: 0.3rem 0.7rem; font-size: 0.65rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.08em; transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
        }
        .li-action:hover { border-color: var(--gold); color: var(--gold); }

        .view-toggle {
            display: flex; gap: 0; border: 1px solid var(--border);
        }
        .view-toggle button {
            background: var(--surface); border: none; color: var(--text-light);
            padding: 0.4rem 0.9rem; font-size: 0.7rem; cursor: pointer;
            font-family: 'Roboto', sans-serif; transition: background 0.15s ease, color 0.15s ease;
        }
        .view-toggle button.active { background: var(--gold); color: var(--charcoal-deep); }
        .registrations-modal {
            background: var(--surface); border: 1px solid var(--border);
            width: min(92vw, 900px); max-height: 90vh; overflow-y: auto;
            padding: 1.5rem;
        }
        .registrations-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;
        }
        .registrations-header h3 {
            font-family: 'EB Garamond', serif; font-style: italic; font-size: 1.3rem; margin: 0;
        }
        .registrations-subtitle {
            color: var(--text-light); font-size: 0.8rem; margin-top: 0.2rem;
        }
        .registration-summary {
            display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem;
        }
        .registration-pill {
            background: var(--bg); border: 1px solid var(--border); padding: 0.55rem 0.8rem;
            font-size: 0.75rem; color: var(--text-light);
        }
        .registration-pill strong { color: var(--text); font-size: 0.95rem; margin-right: 0.35rem; }
        .registrations-empty {
            color: var(--text-light); text-align: center; padding: 2rem 1rem;
            border: 1px dashed var(--border);
        }
        .registrations-list {
            display: flex; flex-direction: column; gap: 0.75rem;
        }
        .registration-card {
            border: 1px solid var(--border); background: var(--bg); padding: 0.9rem;
        }
        .registration-card-header {
            display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
            margin-bottom: 0.45rem;
        }
        .registration-name {
            font-size: 0.95rem; color: var(--text); font-weight: 500;
        }
        .registration-status {
            font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
            padding: 0.2rem 0.45rem; border: 1px solid var(--border); color: var(--text-light);
        }
        .registration-meta {
            display: flex; flex-wrap: wrap; gap: 0.75rem; color: var(--text-light);
            font-size: 0.78rem; margin-bottom: 0.5rem;
        }
        .registration-notes {
            color: var(--text); font-size: 0.82rem; white-space: pre-wrap;
            border-top: 1px solid var(--border); padding-top: 0.5rem; margin-top: 0.5rem;
        }
        .registration-actions {
            display: flex; justify-content: flex-end; margin-top: 0.65rem;
        }

        @media (max-width: 768px) {
            .calendar-grid { font-size: 0.7rem; }
            .cal-day { min-height: 60px; padding: 0.2rem; }
            .cal-event { font-size: 0.55rem; }
            .calendar-header { flex-direction: column; align-items: flex-start; }
            .fm-row, .fm-row-3 { grid-template-columns: 1fr; }
            .main-content { padding-bottom: 70px; }
            .add-class-btn { width: 100%; text-align: center; min-height: 44px; }
        }
    </style>

<script>
    let classes = [];
    let currentYear, currentMonth;
    let editingId = null;
    let currentView = 'calendar';
    let currentSession = null;
    let currentRegistrationClassId = null;

    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    async function init() {
        const session = await window.bmmAuth.loadSession();
        if (!session) {
            window.location.href = '/vendor/login.html';
            return;
        }
        currentSession = session;

        const userName = document.getElementById('user-name');
        if (userName) userName.textContent = session.name || 'User';

        const canHostView = session.role === 'vendor' || session.is_vendor;
        if (!session.canManageStudio && !canHostView) {
            document.body.classList.add('bmm-blocked');
            document.getElementById('alert-container').innerHTML = '<div class="alert alert-error">Studio access is not enabled for your account.</div>';
            return;
        }

        if (!session.canManageStudio) {
            const addBtn = document.querySelector('.add-class-btn');
            if (addBtn) addBtn.style.display = 'none';
        }

        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth();
        await loadClasses();
    }

    async function loadClasses() {
        const start = new Date(currentYear, currentMonth, 1);
        const end = new Date(currentYear, currentMonth + 1, 0);
        const pad = d => String(d).padStart(2, '0');
        const startStr = `${start.getFullYear()}-${pad(start.getMonth()+1)}-01`;
        const endStr = `${end.getFullYear()}-${pad(end.getMonth()+1)}-${pad(end.getDate())}`;

        try {
            const unpublishedScope = currentSession && (currentSession.canManageStudio || currentSession.role === 'vendor' || currentSession.is_vendor);
            classes = await apiGet(`/api/v1/studio/classes?start=${startStr}&end=${endStr}&published_only=${unpublishedScope ? 'false' : 'true'}`);
        } catch (e) {
            classes = [];
        }

        renderStats();
        if (currentView === 'calendar') renderCalendar();
        else renderList();
    }

    function renderStats() {
        const upcoming = classes.filter(c => !c.is_cancelled && c.class_date >= new Date().toISOString().slice(0,10));
        const totalEnrolled = classes.reduce((s, c) => s + c.enrolled, 0);
        const totalRevenue = classes.reduce((s, c) => s + (c.enrolled * parseFloat(c.price)), 0);

        document.getElementById('stats-row').innerHTML = `
            <div class="stat-pill"><span class="sp-num">${classes.length}</span><span class="sp-label">This Month</span></div>
            <div class="stat-pill"><span class="sp-num">${upcoming.length}</span><span class="sp-label">Upcoming</span></div>
            <div class="stat-pill"><span class="sp-num">${totalEnrolled}</span><span class="sp-label">Enrolled</span></div>
            <div class="stat-pill"><span class="sp-num">$${totalRevenue.toFixed(0)}</span><span class="sp-label">Revenue</span></div>
        `;
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        document.getElementById('month-label').textContent = `${MONTHS[currentMonth]} ${currentYear}`;

        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        const startDow = firstDay.getDay();
        const daysInMonth = lastDay.getDate();

        let html = DAYS.map(d => `<div class="cal-day-header">${d}</div>`).join('');

        const prevLast = new Date(currentYear, currentMonth, 0).getDate();
        for (let i = startDow - 1; i >= 0; i--) {
            html += `<div class="cal-day other-month"><span class="cal-day-num">${prevLast - i}</span></div>`;
        }

        const today = new Date().toISOString().slice(0, 10);
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = dateStr === today;
            const dayClasses = classes.filter(c => c.class_date === dateStr);

            let eventsHtml = dayClasses.map(c => {
                let cls = 'cal-event';
                if (c.is_cancelled) cls += ' cancelled';
                else if (c.spots_left <= 0) cls += ' full';
                const t = c.start_time.slice(0,5);
                const escaped = JSON.stringify(c).replace(/"/g,'&quot;');
                const action = currentSession?.canManageStudio
                    ? `openModal(${escaped})`
                    : `openRegistrations(${c.id}, ${JSON.stringify(c.title).replace(/"/g,'&quot;')})`;
                return `<div class="${cls}" onclick="event.stopPropagation();${action}" title="${c.title} - ${c.instructor}">${t} ${c.title}</div>`;
            }).join('');

            const dayClick = currentSession?.canManageStudio ? `openModalForDate('${dateStr}')` : 'void(0)';
            html += `<div class="cal-day${isToday ? ' today' : ''}" onclick="${dayClick}">
                <span class="cal-day-num">${d}</span>${eventsHtml}
            </div>`;
        }

        const totalCells = startDow + daysInMonth;
        const remaining = (7 - (totalCells % 7)) % 7;
        for (let i = 1; i <= remaining; i++) {
            html += `<div class="cal-day other-month"><span class="cal-day-num">${i}</span></div>`;
        }

        grid.innerHTML = html;
    }

    function renderList() {
        const container = document.getElementById('list-view');
        if (classes.length === 0) {
            container.innerHTML = '<p style="color:var(--text-light);text-align:center;padding:2rem">No classes scheduled this month.</p>';
            return;
        }

        const sorted = [...classes].sort((a,b) => a.class_date.localeCompare(b.class_date) || a.start_time.localeCompare(b.start_time));
        const today = new Date().toISOString().slice(0,10);

        container.innerHTML = sorted.map(c => {
            let badge = '', badgeCls = '';
            if (c.is_cancelled) { badge = 'Cancelled'; badgeCls = 'badge-cancelled'; }
            else if (c.class_date < today) { badge = 'Past'; badgeCls = 'badge-past'; }
            else if (c.spots_left <= 0) { badge = 'Full'; badgeCls = 'badge-full'; }
            else { badge = `${c.spots_left} spots`; badgeCls = 'badge-open'; }

            const d = new Date(c.class_date + 'T12:00:00');
            const dateStr = window.bmmFormatDate(d, { weekday: 'short', month: 'short', day: 'numeric' });
            const timeStr = `${c.start_time.slice(0,5)} - ${c.end_time.slice(0,5)}`;

            const editButton = currentSession?.canManageStudio
                ? `<button class="li-action" onclick='openModal(${JSON.stringify(c)})'>Edit</button>`
                : '';
            return `<div class="list-item">
                <div class="li-main">
                    <div class="li-title">${c.title}</div>
                    <div class="li-meta">${dateStr} &bull; ${timeStr} &bull; ${c.instructor} &bull; $${parseFloat(c.price).toFixed(2)} &bull; ${c.location}</div>
                </div>
                <div class="li-right">
                    <span class="li-badge ${badgeCls}">${badge}</span>
                    <span style="font-size:0.8rem;color:var(--text-light)">${c.enrolled}/${c.capacity}</span>
                    <button class="li-action" onclick='openRegistrations(${c.id}, ${JSON.stringify(c.title)})'>Registrations</button>
                    ${editButton}
                </div>
            </div>`;
        }).join('');
    }

    function setView(view) {
        currentView = view;
        document.getElementById('btn-calendar').classList.toggle('active', view === 'calendar');
        document.getElementById('btn-list').classList.toggle('active', view === 'list');
        document.getElementById('calendar-view').style.display = view === 'calendar' ? 'block' : 'none';
        document.getElementById('list-view').style.display = view === 'list' ? 'block' : 'none';
        if (view === 'calendar') renderCalendar();
        else renderList();
    }

    function changeMonth(delta) {
        currentMonth += delta;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        loadClasses();
    }

    function openModalForDate(dateStr) {
        if (!currentSession?.canManageStudio) return;
        openModal(null, dateStr);
    }

    function openModal(classData = null, prefillDate = null) {
        if (!currentSession?.canManageStudio) return;
        editingId = classData ? classData.id : null;
        document.getElementById('modal-title').textContent = classData ? 'Edit Class' : 'New Class';
        document.getElementById('delete-btn').style.display = classData ? 'inline-block' : 'none';
        document.getElementById('form-error').textContent = '';

        document.getElementById('f-title').value = classData?.title || '';
        document.getElementById('f-description').value = classData?.description || '';
        document.getElementById('f-instructor').value = classData?.instructor || '';
        document.getElementById('f-category').value = classData?.category || '';
        document.getElementById('f-date').value = classData?.class_date || prefillDate || '';
        document.getElementById('f-start').value = classData?.start_time?.slice(0,5) || '10:00';
        document.getElementById('f-end').value = classData?.end_time?.slice(0,5) || '12:00';
        document.getElementById('f-price').value = classData?.price || '';
        document.getElementById('f-capacity').value = classData?.capacity || 20;
        document.getElementById('f-location').value = classData?.location || 'Studio';
        document.getElementById('f-published').checked = classData?.is_published !== false;
        document.getElementById('f-cancelled').checked = classData?.is_cancelled || false;

        document.getElementById('f-image').value = '';
        const previewArea = document.getElementById('image-preview-area');
        if (classData?.image_url) {
            document.getElementById('image-preview').src = classData.image_url;
            previewArea.style.display = 'block';
            previewArea.dataset.existingUrl = classData.image_url;
        } else {
            previewArea.style.display = 'none';
            previewArea.dataset.existingUrl = '';
        }
        previewArea.dataset.removeFlag = '';

        document.getElementById('class-modal').classList.add('open');
        setTimeout(() => document.getElementById('f-title').focus(), 100);
    }

    function closeModal() {
        document.getElementById('class-modal').classList.remove('open');
        editingId = null;
    }

    async function openRegistrations(classId, classTitle) {
        currentRegistrationClassId = classId;
        document.getElementById('registrations-title').textContent = classTitle ? `${classTitle} Registrations` : 'Class Registrations';
        document.getElementById('registrations-subtitle').textContent = 'Loading current registrations...';
        document.getElementById('registrations-summary').innerHTML = '';
        document.getElementById('registrations-error').textContent = '';
        document.getElementById('registrations-content').innerHTML = '<div class="registrations-empty">Loading registrations...</div>';
        document.getElementById('registrations-modal').classList.add('open');

        try {
            const rows = await apiGet(`/api/v1/studio/classes/${classId}/registrations`);
            const activeRows = rows.filter(r => r.status !== 'cancelled');
            const totalSpots = activeRows.reduce((sum, row) => sum + (parseInt(row.num_spots, 10) || 0), 0);
            document.getElementById('registrations-subtitle').textContent = rows.length
                ? 'Current and cancelled signups for this class.'
                : 'No one has signed up yet.';
            document.getElementById('registrations-summary').innerHTML = `
                <div class="registration-pill"><strong>${rows.length}</strong> registrations</div>
                <div class="registration-pill"><strong>${totalSpots}</strong> active spots</div>
            `;

            if (!rows.length) {
                document.getElementById('registrations-content').innerHTML = '<div class="registrations-empty">No registrations yet.</div>';
                return;
            }

            document.getElementById('registrations-content').innerHTML = `
                <div class="registrations-list">
                    ${rows.map(row => renderRegistrationCard(row)).join('')}
                </div>
            `;
        } catch (e) {
            document.getElementById('registrations-error').textContent = e.message || 'Failed to load registrations';
            document.getElementById('registrations-content').innerHTML = '<div class="registrations-empty">Unable to load registrations.</div>';
        }
    }

    function renderRegistrationCard(row) {
        const createdAt = row.created_at ? window.bmmFormatDateTime(new Date(row.created_at)) : 'Unknown';
        const notes = row.notes ? `<div class="registration-notes">${escapeHtml(row.notes)}</div>` : '';
        const cancelButton = row.status !== 'cancelled'
            ? `<div class="registration-actions"><button class="li-action" onclick="cancelRegistration(${row.id})">Cancel Registration</button></div>`
            : '';
        return `
            <div class="registration-card">
                <div class="registration-card-header">
                    <div class="registration-name">${escapeHtml(row.customer_name || 'Unknown')}</div>
                    <div class="registration-status">${escapeHtml(row.status || 'registered')}</div>
                </div>
                <div class="registration-meta">
                    <span>${escapeHtml(row.customer_email || 'No email')}</span>
                    <span>${escapeHtml(row.customer_phone || 'No phone')}</span>
                    <span>${parseInt(row.num_spots, 10) || 0} spot(s)</span>
                    <span>Signed up ${escapeHtml(createdAt)}</span>
                </div>
                ${notes}
                ${cancelButton}
            </div>
        `;
    }

    async function cancelRegistration(registrationId) {
        if (!confirm('Cancel this registration?')) return;
        try {
            await apiDelete(`/api/v1/studio/registrations/${registrationId}`);
            const title = document.getElementById('registrations-title').textContent.replace(/ Registrations$/, '');
            if (currentRegistrationClassId) {
                await openRegistrations(currentRegistrationClassId, title);
                await loadClasses();
            }
        } catch (e) {
            document.getElementById('registrations-error').textContent = e.message || 'Failed to cancel registration';
        }
    }

    function closeRegistrations() {
        currentRegistrationClassId = null;
        document.getElementById('registrations-modal').classList.remove('open');
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    async function saveClass() {
        const title = document.getElementById('f-title').value.trim();
        const instructor = document.getElementById('f-instructor').value.trim();
        const classDate = document.getElementById('f-date').value;
        const startTime = document.getElementById('f-start').value;
        const endTime = document.getElementById('f-end').value;
        const price = parseFloat(document.getElementById('f-price').value);
        const errEl = document.getElementById('form-error');

        if (!title) { errEl.textContent = 'Title is required'; return; }
        if (!instructor) { errEl.textContent = 'Instructor is required'; return; }
        if (!classDate) { errEl.textContent = 'Date is required'; return; }
        if (!startTime || !endTime) { errEl.textContent = 'Start and end times are required'; return; }
        if (isNaN(price) || price < 0) { errEl.textContent = 'Valid price is required'; return; }

        const body = {
            title,
            description: document.getElementById('f-description').value || null,
            instructor,
            category: document.getElementById('f-category').value || null,
            class_date: classDate,
            start_time: startTime + ':00',
            end_time: endTime + ':00',
            price,
            capacity: parseInt(document.getElementById('f-capacity').value) || 20,
            location: document.getElementById('f-location').value || 'Studio',
            is_published: document.getElementById('f-published').checked,
            is_cancelled: document.getElementById('f-cancelled').checked,
        };

        try {
            let savedClass;
            if (editingId) {
                savedClass = await apiPut(`/api/v1/studio/classes/${editingId}`, body);
            } else {
                savedClass = await apiPost('/api/v1/studio/classes', body);
            }

            const classId = savedClass?.id || editingId;
            const previewArea = document.getElementById('image-preview-area');
            const fileInput = document.getElementById('f-image');

            if (previewArea.dataset.removeFlag === '1' && !fileInput.files.length && classId) {
                const token = sessionStorage.getItem('bmm_token');
                await fetch(`/api/v1/studio/classes/${classId}/image`, {
                    method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
                });
            }

            if (fileInput.files.length > 0 && classId) {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                const token = sessionStorage.getItem('bmm_token');
                const resp = await fetch(`/api/v1/studio/classes/${classId}/image`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData
                });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || 'Failed to upload image');
                }
            }

            closeModal();
            await loadClasses();
        } catch (e) {
            errEl.textContent = e.message || 'Failed to save class';
        }
    }

    async function deleteClass() {
        if (!editingId) return;
        if (!confirm('Delete this class permanently?')) return;

        try {
            await apiDelete(`/api/v1/studio/classes/${editingId}`);
            closeModal();
            await loadClasses();
        } catch (e) {
            document.getElementById('form-error').textContent = e.message || 'Failed to delete';
        }
    }

    function removeImage() {
        const previewArea = document.getElementById('image-preview-area');
        previewArea.style.display = 'none';
        previewArea.dataset.removeFlag = '1';
        document.getElementById('f-image').value = '';
    }

    document.getElementById('f-image').addEventListener('change', function() {
        const previewArea = document.getElementById('image-preview-area');
        if (this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('image-preview').src = e.target.result;
                previewArea.style.display = 'block';
                previewArea.dataset.removeFlag = '';
            };
            reader.readAsDataURL(this.files[0]);
        }
    });

    function handleLogout() {
        window.bmmAuth.logout();
    }
    function toggleMobileNav() {
        document.getElementById('mobile-nav').classList.toggle('open');
    }

    init();
</script>
</body>
</html>
