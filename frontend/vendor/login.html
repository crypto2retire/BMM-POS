<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BMM-POS</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <h1>BMM-POS</h1>
            <p>Bowenstreet Market Point of Sale</p>
        </div>
        <div id="alert-container"></div>
        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-control" type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button class="btn btn-primary btn-lg" type="submit" id="login-btn">Sign In</button>
        </form>
    </div>
</div>
<script src="/static/js/api.js"></script>
<script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const btn = document.getElementById("login-btn");
        btn.disabled = true;
        btn.textContent = "Signing in...";
        try {
            const payload = await apiLogin(email, password);
            if (payload.role === "admin") {
                window.location.href = "/admin/index.html";
            } else {
                window.location.href = "/vendor/dashboard.html";
            }
        } catch (err) {
            showAlert("alert-container", err.message, "error");
            btn.disabled = false;
            btn.textContent = "Sign In";
        }
    });
</script>
</body>
</html>
