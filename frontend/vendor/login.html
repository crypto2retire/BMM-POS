<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Login — Bowenstreet Market</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="icon" type="image/webp" href="/static/images/favicon.webp">
    <style>
        .login-page { padding-bottom: 0; }
        .login-subtitle {
            font-family: 'EB Garamond', serif;
            font-size: 0.95rem;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 2rem;
            font-style: italic;
            opacity: 0.7;
        }
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .login-footer a {
            font-size: 0.68rem;
            color: var(--text-light);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            font-family: 'Roboto', sans-serif;
            transition: color 0.2s;
        }
        .login-footer a:hover { color: var(--gold); }

        /* ── Choice screen ──────────────────────────────── */
        .choice-screen { display: none; }
        .choice-screen.active { display: block; }
        .choice-greeting {
            font-family: 'EB Garamond', serif;
            font-size: 1.3rem;
            text-align: center;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .choice-sub {
            font-family: 'Roboto', sans-serif;
            font-size: 0.8rem;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 1.75rem;
            letter-spacing: 0.04em;
        }
        .choice-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .choice-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.1rem 1.25rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            transition: border-color 0.25s, box-shadow 0.25s;
            text-decoration: none;
        }
        .choice-btn:hover {
            border-color: var(--warm-border);
            box-shadow: var(--shadow-warm);
            color: var(--text);
        }
        .choice-icon {
            font-size: 1.6rem;
            flex-shrink: 0;
            width: 2.2rem;
            text-align: center;
        }
        .choice-label {
            font-family: 'EB Garamond', serif;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .choice-desc {
            font-family: 'Roboto', sans-serif;
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 2px;
        }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <img src="/static/images/logo.webp" alt="Bowenstreet Market">
            <p>Point of Sale System</p>
        </div>
        <div class="login-subtitle">Handcrafted &middot; Vintage &middot; Antique</div>
        <div id="alert-container"></div>

        <!-- Login form -->
        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-control" type="email" id="email" name="email"
                    placeholder="you@example.com" required
                    autocomplete="email" inputmode="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" name="password"
                    placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required
                    autocomplete="current-password">
            </div>
            <button class="btn btn-primary btn-lg btn-full" type="submit" id="login-btn">Sign In</button>
        </form>

        <!-- Choice screen (shown when admin/cashier also has a booth) -->
        <div class="choice-screen" id="choice-screen">
            <div class="choice-greeting" id="choice-greeting">Welcome back</div>
            <div class="choice-sub">Where would you like to go?</div>
            <div class="choice-buttons">
                <a href="#" class="choice-btn" id="choice-admin">
                    <span class="choice-icon">&#128202;</span>
                    <div>
                        <div class="choice-label" id="choice-admin-label">Admin Dashboard</div>
                        <div class="choice-desc">Manage vendors, reports, and settings</div>
                    </div>
                </a>
                <a href="/vendor/dashboard.html" class="choice-btn" id="choice-booth">
                    <span class="choice-icon">&#127991;&#65039;</span>
                    <div>
                        <div class="choice-label">My Booth</div>
                        <div class="choice-desc">View your items, sales, and balance</div>
                    </div>
                </a>
            </div>
        </div>

        <div class="login-footer">
            <a href="/shop/index.html">Browse Our Shop</a>
        </div>
    </div>
</div>
<script src="/static/js/api.js"></script>
<script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const btn = document.getElementById("login-btn");
        btn.disabled = true;
        btn.textContent = "Signing in...";
        try {
            const res = await fetch("/api/v1/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ username: email, password: password }).toString(),
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: "Login failed" }));
                throw new Error(err.detail || "Login failed");
            }
            const data = await res.json();
            const token = data.access_token;
            sessionStorage.setItem("bmm_token", token);
            const payload = JSON.parse(atob(token.split(".")[1]));

            if (data.redirect === "choose") {
                // Show choice screen
                document.getElementById("login-form").style.display = "none";
                document.getElementById("choice-screen").classList.add("active");
                document.getElementById("choice-greeting").textContent = `Welcome back, ${payload.name || 'there'}`;

                // Set admin link based on role
                const adminLink = document.getElementById("choice-admin");
                const adminLabel = document.getElementById("choice-admin-label");
                if (payload.role === "admin") {
                    adminLink.href = "/admin/index.html";
                    adminLabel.textContent = "Admin Dashboard";
                } else {
                    adminLink.href = "/pos/index.html";
                    adminLabel.textContent = "POS Terminal";
                    document.querySelector("#choice-admin .choice-desc").textContent = "Ring up sales at the register";
                }
            } else if (data.redirect) {
                window.location.href = data.redirect;
            } else {
                // Fallback to role-based redirect
                if (payload.role === "admin") {
                    window.location.href = "/admin/index.html";
                } else if (payload.role === "cashier") {
                    window.location.href = "/pos/index.html";
                } else {
                    window.location.href = "/vendor/dashboard.html";
                }
            }
        } catch (err) {
            showAlert("alert-container", err.message, "error");
            btn.disabled = false;
            btn.textContent = "Sign In";
        }
    });
</script>
</body>
</html>
