<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Login — Bowenstreet Market</title>
    <meta name="description" content="Sign in to Bowenstreet Market POS — vendor portal, admin dashboard, and point of sale system for Oshkosh's premier antique marketplace.">
    <meta property="og:title" content="Sign In — Bowenstreet Market">
    <meta property="og:description" content="Vendor portal and POS system for Bowenstreet Market, Oshkosh WI.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.bowenstreetmarket.com/vendor/login.html">
    <meta property="og:image" content="https://www.bowenstreetmarket.com/static/images/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://www.bowenstreetmarket.com/vendor/login.html">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="icon" type="image/webp" href="/static/images/favicon.webp">
    <style>
        .login-page {
            padding-bottom: 0;
            background: #F5F0E8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #EDE8DC;
            box-shadow: 0 4px 24px rgba(90, 75, 50, 0.12);
            border-top: 3px solid #C9A84C;
            color: #2A2825;
        }
        .login-logo p {
            color: #5a554d;
        }
        .login-masthead {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-masthead-title {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 2.2rem;
            color: #2A2825;
            margin: 0;
            line-height: 1.2;
        }
        .login-subtitle {
            font-family: 'EB Garamond', serif;
            font-size: 0.95rem;
            color: #5a554d;
            text-align: center;
            margin-bottom: 2rem;
            font-style: italic;
            opacity: 0.85;
        }
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(42, 40, 37, 0.08);
        }
        .login-footer a {
            font-size: 0.78rem;
            color: #5a554d;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            font-family: 'Roboto', sans-serif;
            transition: color 0.2s;
        }
        .login-footer a:hover { color: #C9A84C; }
        .forgot-password-link {
            font-size: 0.85rem;
            color: #5a554d;
            text-decoration: none;
            font-family: 'Roboto', sans-serif;
            display: inline-block;
            padding: 0.5rem 1rem;
            transition: color 0.2s ease;
        }
        .forgot-password-link:hover { color: #C9A84C; }

        /* Form overrides for light theme */
        .login-card .form-label {
            color: #5a554d;
        }
        .login-card .form-control {
            background: #ffffff;
            color: #2A2825;
            border-color: rgba(42, 40, 37, 0.15);
        }
        .login-card .form-control::placeholder {
            color: #a09a90;
        }
        .login-card .form-control:focus {
            border-color: #C9A84C;
            box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.15);
        }
        .login-card .btn-primary {
            background: #C9A84C;
            color: #2A2825;
            border: none;
            font-weight: 600;
        }
        .login-card .btn-primary:hover {
            background: #b8973e;
            color: #2A2825;
        }

        /* ── Choice screen ──────────────────────────────── */
        .choice-screen { display: none; }
        .choice-screen.active { display: block; }
        .choice-greeting {
            font-family: 'EB Garamond', serif;
            font-size: 1.3rem;
            text-align: center;
            color: #2A2825;
            margin-bottom: 0.5rem;
        }
        .choice-sub {
            font-family: 'Roboto', sans-serif;
            font-size: 0.8rem;
            color: #5a554d;
            text-align: center;
            margin-bottom: 1.75rem;
            letter-spacing: 0.04em;
        }
        .choice-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .choice-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.1rem 1.25rem;
            background: #F5F0E8;
            border: 1px solid rgba(42, 40, 37, 0.12);
            color: #2A2825;
            cursor: pointer;
            transition: border-color 0.25s, box-shadow 0.25s;
            text-decoration: none;
            width: 100%;
            text-align: left;
            font: inherit;
        }
        .choice-btn:hover {
            border-color: #C9A84C;
            box-shadow: 0 2px 12px rgba(201, 168, 76, 0.15);
            color: #2A2825;
        }
        .choice-icon {
            font-size: 1.6rem;
            flex-shrink: 0;
            width: 2.2rem;
            text-align: center;
        }
        .choice-label {
            font-family: 'EB Garamond', serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: #2A2825;
        }
        .choice-desc {
            font-family: 'Roboto', sans-serif;
            font-size: 0.85rem;
            color: #5a554d;
            margin-top: 2px;
        }
        .login-toggle-row {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            margin-top: 0.95rem;
            color: #5a554d;
            font-family: 'Roboto', sans-serif;
            font-size: 0.86rem;
        }
        .login-toggle-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #C9A84C;
        }
        .login-toggle-note {
            margin-top: 0.25rem;
            color: #7b7468;
            font-size: 0.74rem;
            line-height: 1.4;
        }
    </style>
<link rel="manifest" href="/manifest.json">
</head>
<body>
<script src="/static/js/theme-loader.js"></script>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <img src="/static/images/logo.png" alt="Bowenstreet Market" width="72" height="72">
        </div>
        <div class="login-masthead">
            <h1 class="login-masthead-title">Bowenstreet Market</h1>
        </div>
        <div class="login-subtitle">Handcrafted &middot; Vintage &middot; Antique &middot; Oshkosh, WI</div>
        <div id="alert-container"></div>

        <!-- Login form -->
        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-control" type="email" id="email" name="email"
                    placeholder="you@example.com" required
                    autocomplete="email" inputmode="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" name="password"
                    placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required
                    autocomplete="current-password">
            </div>
            <label class="login-toggle-row" for="remember-me">
                <input type="checkbox" id="remember-me" checked>
                <span>Remember me</span>
            </label>
            <div class="login-toggle-note">Stay logged in when you close the browser.</div>
            <button class="btn btn-primary btn-lg btn-full" type="submit" id="login-btn">Sign In</button>
            <div style="text-align: center; margin-top: 12px;">
                <a href="/vendor/forgot-password.html" class="forgot-password-link">Forgot your password?</a>
            </div>
        </form>

        <!-- Choice screen (shown when admin/cashier also has a booth) -->
        <div class="choice-screen" id="choice-screen">
            <div class="choice-greeting" id="choice-greeting">Welcome back</div>
            <div class="choice-sub">Where would you like to go?</div>
            <div class="choice-buttons">
                <button type="button" class="choice-btn" id="choice-admin" onclick="chooseStaffArea()">
                    <span class="choice-icon">&#128202;</span>
                    <div>
                        <div class="choice-label" id="choice-admin-label">Admin Dashboard</div>
                        <div class="choice-desc" id="choice-admin-desc">Manage vendors, reports, and settings</div>
                    </div>
                </button>
                <button type="button" class="choice-btn" id="choice-booth" onclick="chooseBoothArea()">
                    <span class="choice-icon">&#127991;&#65039;</span>
                    <div>
                        <div class="choice-label">My Booth</div>
                        <div class="choice-desc">View your items, sales, and balance</div>
                    </div>
                </button>
            </div>
        </div>

        <div class="login-footer">
            <a href="/shop/index.html">Browse Our Shop</a>
        </div>
    </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/assistant-panel.js"></script>
<script>
    function chooseStaffArea() {
        var target = document.getElementById('choice-admin').dataset.target || '/admin/index.html';
        sessionStorage.removeItem('bmm_booth_mode');
        window.location.href = target;
    }

    function chooseBoothArea() {
        sessionStorage.setItem('bmm_booth_mode', '1');
        window.location.href = '/vendor/dashboard.html';
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const btn = document.getElementById("login-btn");
        btn.disabled = true;
        btn.textContent = "Signing In…";
        try {
            const res = await fetch("/api/v1/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ username: email, password: password }).toString(),
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: "Login failed" }));
                throw new Error(err.detail || "Login failed");
            }
            const data = await res.json();
            const token = data.access_token;
            const remember = document.getElementById("remember-me").checked;
            const storage = remember ? localStorage : sessionStorage;
            storage.setItem("bmm_token", token);
            // Sync to both so api.js can find it regardless
            if (remember) {
                sessionStorage.setItem("bmm_token", token);
            }
            if (data.first_login) {
                storage.setItem("bmm_first_login", "1");
            }
            const payload = JSON.parse(atob(token.split(".")[1]));
            if (payload.role === "admin") {
                storage.removeItem("bmm_booth_mode");
            }

            if (data.redirect === "choose") {
                document.getElementById("login-form").style.display = "none";
                document.getElementById("choice-screen").classList.add("active");
                document.getElementById("choice-greeting").textContent = `Welcome back, ${data.name || payload.name || 'there'}`;

                // Set admin link based on role
                const adminButton = document.getElementById("choice-admin");
                const adminLabel = document.getElementById("choice-admin-label");
                const adminDesc = document.getElementById("choice-admin-desc");
                if (payload.role === "admin") {
                    adminButton.dataset.target = "/admin/index.html";
                    adminLabel.textContent = "Admin Dashboard";
                    adminDesc.textContent = "Manage vendors, reports, and settings";
                } else {
                    adminButton.dataset.target = "/pos/index.html";
                    adminLabel.textContent = "POS Terminal";
                    adminDesc.textContent = "Ring up sales at the register";
                }
            } else if (data.redirect) {
                window.location.href = data.redirect;
            } else {
                // Fallback to role-based redirect
                if (payload.role === "admin") {
                    window.location.href = "/admin/index.html";
                } else if (payload.role === "cashier") {
                    window.location.href = "/pos/index.html";
                } else {
                    window.location.href = "/vendor/dashboard.html";
                }
            }
        } catch (err) {
            showAlert("alert-container", err.message, "error");
            btn.disabled = false;
            btn.textContent = "Sign In";
        }
    });
</script>
</body>
</html>
