<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — BMM-POS</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="icon" type="image/webp" href="/static/images/favicon.webp">
</head>
<body class="has-bottom-nav">
<nav class="navbar">
    <a href="/vendor/dashboard.html" class="navbar-brand">
        <img src="/static/images/logo.webp" alt="Bowenstreet Market" class="navbar-logo">
    </a>
    <div class="navbar-user">
        <span id="vendor-name">Loading...</span>
        <button class="nav-hamburger" id="hamburger-btn" onclick="toggleNav()" aria-label="Menu">☰</button>
        <nav class="navbar-nav" id="main-nav">
            <a href="/vendor/dashboard.html" class="active">Dashboard</a>
            <a href="/vendor/items.html">My Items</a>
            <a href="#" onclick="handleLogout()">Logout</a>
        </nav>
    </div>
</nav>

<div class="main-content">
    <div id="alert-container"></div>

    <!-- Mobile CTA -->
    <a href="/vendor/items.html" class="btn btn-primary btn-lg btn-full" id="mobile-add-btn"
        style="display:none; margin-bottom:1rem; font-size:1rem; letter-spacing:0.08em">
        + Add New Item
    </a>

    <div class="page-header">
        <h1 class="page-title">Dashboard</h1>
        <a href="/vendor/items.html" class="btn btn-primary" id="desktop-manage-btn">Manage Items</a>
    </div>

    <div class="stats-grid">
        <div class="card">
            <div class="card-title">Current Balance</div>
            <div class="card-value green" id="balance">—</div>
        </div>
        <div class="card">
            <div class="card-title">Active Items</div>
            <div class="card-value teal" id="active-items">—</div>
        </div>
        <div class="card">
            <div class="card-title">Total Items</div>
            <div class="card-value" id="total-items">—</div>
        </div>
        <div class="card">
            <div class="card-title">Booth</div>
            <div class="card-value" id="booth-number">—</div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <h2 class="section-title">Recent Items</h2>
            <a href="/vendor/items.html" class="btn btn-outline btn-sm">View All</a>
        </div>

        <!-- Mobile card list -->
        <div id="items-cards" style="display:none"></div>

        <!-- Desktop table -->
        <div class="card" id="items-table-wrap">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Sale Price</th>
                            <th>Status</th>
                            <th>Qty</th>
                        </tr>
                    </thead>
                    <tbody id="items-table-body">
                        <tr><td colspan="6" class="loading">Loading items...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Bottom navigation (mobile only) -->
<nav class="mobile-bottom-nav">
    <a href="/vendor/dashboard.html" class="active">
        <span class="nav-icon">🏠</span>
        <span>Home</span>
    </a>
    <a href="/vendor/items.html">
        <span class="nav-icon">🏷️</span>
        <span>Items</span>
    </a>
    <button onclick="handleLogout()">
        <span class="nav-icon">🚪</span>
        <span>Logout</span>
    </button>
</nav>

<script src="/static/js/api.js"></script>
<script src="/static/js/assistant.js" defer></script>
<script>
    function handleLogout() {
        clearToken();
        window.location.href = "/vendor/login.html";
    }

    function toggleNav() {
        document.getElementById('main-nav').classList.toggle('open');
    }

    document.addEventListener('click', function(e) {
        const nav = document.getElementById('main-nav');
        const btn = document.getElementById('hamburger-btn');
        if (!nav.contains(e.target) && !btn.contains(e.target)) {
            nav.classList.remove('open');
        }
    });

    function statusBadge(status) {
        const map = { active: "badge-green", sold: "badge-blue", removed: "badge-red" };
        return `<span class="badge ${map[status] || "badge-gray"}">${status}</span>`;
    }

    function activePrice(item) {
        const today = new Date().toISOString().split("T")[0];
        if (item.sale_price && item.sale_start && item.sale_end &&
            item.sale_start <= today && today <= item.sale_end) {
            return { isOnSale: true, display: `<span class="price-original">$${parseFloat(item.price).toFixed(2)}</span> <span class="price-sale">$${parseFloat(item.sale_price).toFixed(2)}</span>` };
        }
        return { isOnSale: false, display: `$${parseFloat(item.price).toFixed(2)}` };
    }

    function isMobile() { return window.innerWidth < 768; }

    function renderItemCards(items) {
        if (items.length === 0) {
            return `<div class="card"><p class="empty-state">No items yet. <a href="/vendor/items.html">Add your first item</a>.</p></div>`;
        }
        return items.slice(0, 10).map(item => {
            const ap = activePrice(item);
            const photoHtml = (item.photo_urls && item.photo_urls.length)
                ? `<img src="${item.photo_urls[0]}" alt="">`
                : `🏷️`;
            return `<div class="item-card">
                <div class="item-card-top">
                    <div class="item-card-photo">${photoHtml}</div>
                    <div class="item-card-info">
                        <div class="item-card-name">${item.name}</div>
                        <div class="item-card-price">${ap.display}</div>
                        <div class="item-card-meta">${item.category || '—'} &middot; Qty: ${item.quantity} &middot; ${statusBadge(item.status)}</div>
                    </div>
                </div>
                <div class="item-card-actions">
                    <a href="/vendor/items.html" class="btn btn-outline">Edit</a>
                    <a href="/vendor/items.html" class="btn btn-secondary">Labels</a>
                </div>
            </div>`;
        }).join('');
    }

    function renderItemTable(items) {
        if (items.length === 0) {
            return `<tr><td colspan="6" class="empty-state">No items yet. <a href="/vendor/items.html">Add your first item</a>.</td></tr>`;
        }
        return items.slice(0, 10).map(item => {
            const ap = activePrice(item);
            return `<tr>
                <td><a href="/vendor/items.html">${item.name}</a></td>
                <td>${item.category || "—"}</td>
                <td>$${parseFloat(item.price).toFixed(2)}</td>
                <td>${item.sale_price ? `<span class="price-sale">$${parseFloat(item.sale_price).toFixed(2)}</span>` : "—"}</td>
                <td>${statusBadge(item.status)}</td>
                <td>${item.quantity}</td>
            </tr>`;
        }).join('');
    }

    function applyLayout(items) {
        const mobile = isMobile();
        const cardsEl = document.getElementById('items-cards');
        const tableWrap = document.getElementById('items-table-wrap');
        const mobileBtn = document.getElementById('mobile-add-btn');
        const desktopBtn = document.getElementById('desktop-manage-btn');

        if (mobile) {
            cardsEl.style.display = 'block';
            tableWrap.style.display = 'none';
            mobileBtn.style.display = 'flex';
            desktopBtn.style.display = 'none';
            cardsEl.innerHTML = `<div class="item-cards-grid">${renderItemCards(items)}</div>`;
        } else {
            cardsEl.style.display = 'none';
            tableWrap.style.display = 'block';
            mobileBtn.style.display = 'none';
            desktopBtn.style.display = '';
            document.getElementById('items-table-body').innerHTML = renderItemTable(items);
        }
    }

    let cachedItems = [];

    async function loadDashboard() {
        const token = sessionStorage.getItem('bmm_token');
        if (!token) { window.location.href = '/vendor/login.html'; return; }
        const payload = parseToken();
        if (!payload || payload.role !== 'vendor') { window.location.href = '/vendor/login.html'; return; }
        document.getElementById("vendor-name").textContent = payload?.name || "Vendor";

        try {
            const vendor = await apiGet(`/api/v1/vendors/${payload.sub}`);
            document.getElementById("booth-number").textContent = vendor.booth_number || "N/A";
            document.getElementById("balance").textContent = `$${parseFloat(vendor.current_balance || 0).toFixed(2)}`;

            const items = await apiGet("/api/v1/items/");
            const active = items.filter(i => i.status === "active");
            document.getElementById("active-items").textContent = active.length;
            document.getElementById("total-items").textContent = items.length;
            cachedItems = items;
            applyLayout(items);
        } catch (err) {
            showAlert("alert-container", err.message, "error");
        }
    }

    window.addEventListener('resize', () => applyLayout(cachedItems));
    loadDashboard();
</script>
</body>
</html>
