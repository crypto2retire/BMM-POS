<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — BMM-POS</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="icon" type="image/webp" href="/static/images/favicon.webp">
</head>
<body>
<nav class="navbar">
    <a href="/vendor/dashboard.html" class="navbar-brand">
        <img src="/static/images/logo.webp" alt="Bowenstreet Market" class="navbar-logo">
    </a>
    <div class="navbar-user">
        <span id="vendor-name">Loading...</span>
        <nav class="navbar-nav">
            <a href="/vendor/items.html">My Items</a>
            <a href="#" onclick="handleLogout()">Logout</a>
        </nav>
    </div>
</nav>
<div class="main-content">
    <div id="alert-container"></div>
    <div class="page-header">
        <h1 class="page-title">Vendor Dashboard</h1>
        <a href="/vendor/items.html" class="btn btn-primary">Manage Items</a>
    </div>
    <div class="stats-grid">
        <div class="card">
            <div class="card-title">Current Balance</div>
            <div class="card-value green" id="balance">—</div>
        </div>
        <div class="card">
            <div class="card-title">Active Items</div>
            <div class="card-value teal" id="active-items">—</div>
        </div>
        <div class="card">
            <div class="card-title">Total Items</div>
            <div class="card-value" id="total-items">—</div>
        </div>
        <div class="card">
            <div class="card-title">Booth Number</div>
            <div class="card-value" id="booth-number">—</div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <h2 class="section-title">Recent Items</h2>
            <a href="/vendor/items.html" class="btn btn-outline btn-sm">View All</a>
        </div>
        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Sale Price</th>
                            <th>Status</th>
                            <th>Qty</th>
                        </tr>
                    </thead>
                    <tbody id="items-table-body">
                        <tr><td colspan="6" class="loading">Loading items...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="/static/js/api.js"></script>
<script>
    function handleLogout() {
        clearToken();
        window.location.href = "/vendor/login.html";
    }

    function statusBadge(status) {
        const map = { active: "badge-green", sold: "badge-blue", removed: "badge-red" };
        return `<span class="badge ${map[status] || "badge-gray"}">${status}</span>`;
    }

    function formatPrice(item) {
        const today = new Date().toISOString().split("T")[0];
        if (item.sale_price && item.sale_start && item.sale_end &&
            item.sale_start <= today && today <= item.sale_end) {
            return `<span class="price-original">$${parseFloat(item.price).toFixed(2)}</span>
                    <span class="price-sale"> $${parseFloat(item.sale_price).toFixed(2)}</span>`;
        }
        return `$${parseFloat(item.price).toFixed(2)}`;
    }

    async function loadDashboard() {
        const token = sessionStorage.getItem('bmm_token');
        if (!token) { window.location.href = '/vendor/login.html'; return; }
        const payload = parseToken();
        document.getElementById("vendor-name").textContent = payload?.name || "Vendor";

        try {
            const vendor = await apiGet(`/api/v1/vendors/${payload.sub}`);
            document.getElementById("booth-number").textContent = vendor.booth_number || "N/A";
            document.getElementById("balance").textContent = `$${parseFloat(vendor.current_balance || 0).toFixed(2)}`;

            const items = await apiGet("/api/v1/items/");
            const active = items.filter(i => i.status === "active");
            document.getElementById("active-items").textContent = active.length;
            document.getElementById("total-items").textContent = items.length;

            const tbody = document.getElementById("items-table-body");
            const recent = items.slice(0, 10);
            if (recent.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No items yet. <a href="/vendor/items.html">Add your first item</a>.</td></tr>`;
            } else {
                tbody.innerHTML = recent.map(item => `
                    <tr>
                        <td><a href="/vendor/items.html">${item.name}</a></td>
                        <td>${item.category || "—"}</td>
                        <td>$${parseFloat(item.price).toFixed(2)}</td>
                        <td>${item.sale_price ? `<span class="price-sale">$${parseFloat(item.sale_price).toFixed(2)}</span>` : "—"}</td>
                        <td>${statusBadge(item.status)}</td>
                        <td>${item.quantity}</td>
                    </tr>
                `).join("");
            }
        } catch (err) {
            showAlert("alert-container", err.message, "error");
        }
    }

    loadDashboard();
</script>
</body>
</html>
