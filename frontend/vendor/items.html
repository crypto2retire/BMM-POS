<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items — BMM-POS</title>
    <meta name="description" content="Manage your items, pricing, and inventory at Bowenstreet Market.">
    <meta property="og:title" content="Item Management — Bowenstreet Market">
    <meta property="og:description" content="Vendor item management for Bowenstreet Market.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.bowenstreetmm.com/vendor/items.html">
    <meta property="og:image" content="https://www.bowenstreetmm.com/static/images/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://www.bowenstreetmm.com/vendor/items.html">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="icon" type="image/webp" href="/static/images/favicon.webp">
    <style>
        /* label dropdown */
        .label-btn-wrap { position:relative; display:inline-flex; }
        .ldd {
            display:none; position:absolute; top:100%; right:0;
            background:var(--surface); border:1px solid rgba(201,169,110,0.15);
            z-index:200; min-width:140px;
            box-shadow:0 8px 20px rgba(0,0,0,0.4);
        }
        .ldd button {
            display:block; width:100%; text-align:left;
            padding:0.55rem 0.85rem; background:none; border:none;
            color:var(--text); font-size:0.78rem; cursor:pointer;
            min-height:40px; font-family:'Roboto',sans-serif;
            letter-spacing:0.04em; transition:background 0.12s;
        }
        .ldd button:hover { background:rgba(201,169,110,0.06); color:var(--gold); }
        .label-btn-main { border-right:1px solid var(--border) !important; }
        .label-btn-toggle { padding:0.3rem 0.5rem !important; min-width:36px; }

        /* vendor filter bar */
        .vendor-filter-bar { display:flex; align-items:center; gap:0.75rem; margin-bottom:1.25rem; flex-wrap:wrap; }
        .vendor-filter-bar label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-light); white-space:nowrap; }

        /* photo gallery in card */
        .item-card-photos { display:flex; gap:4px; padding:0 1rem 1rem; }
        .item-card-photos img {
            width:48px; height:48px; object-fit:cover; cursor:pointer;
            border:1px solid rgba(255,255,255,0.04); transition:border-color 0.2s;
        }
        .item-card-photos img:hover { border-color:var(--warm-border); }
        .item-card-photos .add-photo-btn {
            width:48px; height:48px; border:1px dashed var(--border); background:none;
            color:var(--text-light); font-size:1.2rem; cursor:pointer; display:flex;
            align-items:center; justify-content:center; position:relative; overflow:hidden;
            transition:border-color 0.2s, color 0.2s;
        }
        .item-card-photos .add-photo-btn:hover { border-color:var(--gold-dim); color:var(--gold); }
        .item-card-photos .add-photo-btn input { position:absolute; inset:0; opacity:0; cursor:pointer; }

        @media (max-width: 767px) { .desktop-only { display:none !important; } }
        @media (min-width: 768px) { .mobile-only { display:none !important; } }

        /* ── In-form AI styles ──────────────────────────────── */
        #ai-describe-btn {
            background:var(--surface-2); border:1px solid var(--border);
            color:var(--text-light); font-size:0.78rem; padding:6px 14px; cursor:pointer;
            display:inline-flex; align-items:center; gap:6px;
            transition:background 0.15s, color 0.15s, border-color 0.15s;
            font-family:'Roboto',sans-serif; letter-spacing:0.06em;
        }
        #ai-describe-btn:hover { background:rgba(201,169,110,0.08); border-color:var(--gold-dim); color:var(--gold); }
        #ai-describe-btn:disabled { opacity:0.45; cursor:default; }

        #ai-suggestion-panel {
            background:rgba(201,169,110,0.04); border:1px solid rgba(201,169,110,0.18);
            border-left:3px solid var(--gold-dim);
            padding:12px; margin-bottom:14px; font-size:0.85rem;
        }
        .ai-sugg-row {
            display:flex; align-items:flex-start; gap:8px;
            padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.82rem;
        }
        .ai-sugg-row:last-child { border-bottom:none; }
        .ai-sugg-label {
            font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em;
            color:var(--text-light); white-space:nowrap; min-width:68px; padding-top:2px;
        }
        .ai-sugg-value { flex:1; color:var(--text); line-height:1.4; }
        .ai-use-btn {
            background:transparent; border:1px solid var(--border); color:var(--text-light);
            font-size:0.68rem; padding:3px 8px; cursor:pointer;
            white-space:nowrap; flex-shrink:0;
            transition:background 0.15s, border-color 0.15s, color 0.15s;
            font-family:'Roboto',sans-serif; letter-spacing:0.06em;
        }
        .ai-use-btn:hover { border-color:var(--gold-dim); color:var(--gold); background:rgba(201,169,110,0.06); }

        /* ── Mini chat ──────────────────────────────────────── */
        #mini-chat-section { border:1px solid var(--border); margin-bottom:12px; }
        #mini-chat-toggle {
            width:100%; background:var(--surface-2); border:none;
            color:var(--text-light); font-size:0.78rem; padding:8px 12px;
            text-align:left; cursor:pointer; display:flex;
            justify-content:space-between; align-items:center; min-height:40px;
            font-family:'Roboto',sans-serif; letter-spacing:0.05em;
            transition:background 0.15s;
        }
        #mini-chat-toggle:hover { background:var(--surface); }
        #mini-chat-messages {
            max-height:180px; overflow-y:auto; padding:10px;
            font-size:0.82rem; display:flex; flex-direction:column;
            gap:6px; background:var(--bg);
        }
        .mc-msg-user {
            align-self:flex-end; background:var(--surface-2); color:var(--text);
            padding:5px 10px; max-width:90%; line-height:1.4;
            border:1px solid var(--border);
        }
        .mc-msg-assistant {
            align-self:flex-start;
            background:rgba(201,169,110,0.06); color:var(--text);
            padding:5px 10px; max-width:90%; line-height:1.4;
            border:1px solid rgba(201,169,110,0.15);
        }
        #mini-chat-input {
            flex:1; background:var(--surface); border:1px solid var(--border);
            color:var(--text); font-size:14px; padding:8px 10px; outline:none;
            font-family:'Roboto',sans-serif; transition:border-color 0.15s;
        }
        #mini-chat-input:focus { border-color:var(--gold-dim); }
    </style>
</head>
<body class="has-bottom-nav">
<nav class="navbar">
    <a href="#" id="nav-brand" class="navbar-brand">
        <img src="/static/images/logo.webp" alt="Bowenstreet Market" class="navbar-logo">
        <span class="store-name" id="nav-role-label">Items</span>
    </a>
    <div class="navbar-user">
        <span id="vendor-name">Loading...</span>
        <button class="nav-hamburger" id="hamburger-btn" onclick="toggleNav()" aria-label="Menu">☰</button>
        <nav class="navbar-nav" id="main-nav">
            <a href="#" id="nav-home">Dashboard</a>
            <a href="#" onclick="handleLogout()">Logout</a>
        </nav>
    </div>
</nav>

<div class="main-content">
    <div id="alert-container"></div>

    <div class="page-header">
        <h1 class="page-title" id="page-title">Items</h1>
        <button class="btn btn-primary" onclick="openModal()">+ Add Item</button>
    </div>

    <div class="ornament">&loz;</div>

    <!-- vendor filter (admin/cashier) -->
    <div id="vendor-filter-wrap" class="vendor-filter-bar" style="display:none">
        <label>Vendor:</label>
        <select class="form-control" id="vendor-filter" onchange="onVendorChange()" style="max-width:260px">
            <option value="">All Vendors</option>
        </select>
    </div>

    <!-- item cards grid -->
    <div class="item-cards-grid" id="items-grid">
        <div style="grid-column:1/-1" class="loading">Loading items…</div>
    </div>
</div>

<!-- Bottom nav (vendor mobile) -->
<nav class="mobile-bottom-nav" id="bottom-nav" style="display:none">
    <a href="/vendor/dashboard.html">
        <span class="nav-icon">🏠</span>
        <span>Home</span>
    </a>
    <a href="/vendor/items.html" class="active">
        <span class="nav-icon">🏷️</span>
        <span>Items</span>
    </a>
    <button onclick="handleLogout()">
        <span class="nav-icon">🚪</span>
        <span>Logout</span>
    </button>
</nav>

<!-- ── Add/Edit Modal ─────────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title" id="modal-title">Add Item</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <div id="modal-alert"></div>
            <form id="item-form" onsubmit="return false">

                <!-- Photo upload — first, prominent on mobile -->
                <div class="form-group">
                    <label class="form-label">Photo</label>
                    <div class="photo-upload-area" id="photo-upload-area" onclick="triggerPhotoInput()">
                        <div id="photo-preview-container">
                            <div class="photo-upload-icon">📷</div>
                            <div class="photo-upload-label">Tap to add photo<br><small style="opacity:0.6">Camera or gallery</small></div>
                        </div>
                        <input type="file"
                            id="f-photo"
                            accept="image/*"
                            capture="environment"
                            style="display:none"
                            onchange="onPhotoSelected(event)">
                    </div>
                    <div id="existing-photos" style="display:none; margin-top:8px">
                        <div style="font-size:0.7rem; color:var(--text-light); margin-bottom:4px">CURRENT PHOTOS</div>
                        <div id="existing-photos-list" style="display:flex; gap:6px; flex-wrap:wrap"></div>
                    </div>
                </div>

                <!-- ── AI Describe button ───────────────────────── -->
                <div id="ai-describe-wrap" style="display:none; margin-top:-4px; margin-bottom:14px; align-items:center; gap:8px">
                    <button type="button" id="ai-describe-btn" onclick="analyzePhotoWithAI()">✨ Describe with AI</button>
                    <span id="ai-describe-status" style="font-size:0.78rem; color:var(--text-light)"></span>
                </div>

                <!-- ── AI Suggestion panel ──────────────────────── -->
                <div id="ai-suggestion-panel" style="display:none">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                        <strong style="font-size:0.72rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-light)">AI Suggestions</strong>
                        <button type="button" onclick="dismissSuggestions()" style="background:none;border:none;color:var(--text-light);cursor:pointer;font-size:1rem;line-height:1;padding:2px 6px">✕</button>
                    </div>
                    <div id="ai-sugg-name" class="ai-sugg-row" style="display:none">
                        <span class="ai-sugg-label">Name</span>
                        <span class="ai-sugg-value" id="ai-sugg-name-val"></span>
                        <button type="button" class="ai-use-btn" onclick="applySuggestion('name')">Use</button>
                    </div>
                    <div id="ai-sugg-category" class="ai-sugg-row" style="display:none">
                        <span class="ai-sugg-label">Category</span>
                        <span class="ai-sugg-value" id="ai-sugg-category-val"></span>
                        <button type="button" class="ai-use-btn" onclick="applySuggestion('category')">Use</button>
                    </div>
                    <div id="ai-sugg-description" class="ai-sugg-row" style="display:none">
                        <span class="ai-sugg-label">Description</span>
                        <span class="ai-sugg-value" id="ai-sugg-description-val"></span>
                        <button type="button" class="ai-use-btn" onclick="applySuggestion('description')">Use</button>
                    </div>
                    <div id="ai-sugg-price" class="ai-sugg-row" style="display:none">
                        <span class="ai-sugg-label">Price range</span>
                        <span class="ai-sugg-value" id="ai-sugg-price-val"></span>
                    </div>
                    <div style="margin-top:10px; padding-top:8px; border-top:1px solid var(--border); display:flex; gap:8px">
                        <button type="button" onclick="applyAllSuggestions()" id="ai-use-all-btn"
                            style="background:#38383B;border:none;color:#fff;font-size:0.8rem;padding:6px 14px;cursor:pointer">Use all</button>
                        <button type="button" onclick="dismissSuggestions()"
                            style="background:none;border:1px solid var(--border);color:var(--text);font-size:0.8rem;padding:6px 14px;cursor:pointer">Dismiss</button>
                    </div>
                </div>

                <!-- Vendor selector (admin/cashier only) -->
                <div class="form-group" id="form-vendor-wrap" style="display:none">
                    <label class="form-label">Vendor *</label>
                    <select class="form-control" id="f-vendor-id">
                        <option value="">Select vendor</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Item Name *</label>
                    <input class="form-control" type="text" id="f-name" required
                        placeholder="e.g. Handmade Ceramic Mug" autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select class="form-control" id="f-category">
                        <option value="">Select category</option>
                        <option>Jewelry</option>
                        <option>Furniture</option>
                        <option>Vintage</option>
                        <option>Art</option>
                        <option>Handcrafted</option>
                        <option>Clothing</option>
                        <option>Books</option>
                        <option>Collectibles</option>
                        <option>Home Decor</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Price *</label>
                        <input class="form-control" type="number" id="f-price"
                            step="0.01" min="0" required
                            placeholder="0.00" inputmode="decimal">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sale Price</label>
                        <input class="form-control" type="number" id="f-sale-price"
                            step="0.01" min="0"
                            placeholder="Leave blank" inputmode="decimal">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Sale Start</label>
                        <input class="form-control" type="date" id="f-sale-start">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sale End</label>
                        <input class="form-control" type="date" id="f-sale-end">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Quantity</label>
                        <input class="form-control" type="number" id="f-quantity"
                            value="1" min="0" inputmode="numeric">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Label Type</label>
                        <select class="form-control" id="f-label-style">
                            <option value="standard">Standard PDF</option>
                            <option value="dymo">Dymo LabelWriter</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" id="f-description" rows="3"
                        placeholder="Optional description…"></textarea>
                </div>

                <!-- ── Mini AI Chat ──────────────────────────────── -->
                <div id="mini-chat-section">
                    <button type="button" id="mini-chat-toggle" onclick="toggleMiniChat()">
                        <span>💬 Ask the assistant</span>
                        <span id="mini-chat-arrow">▾</span>
                    </button>
                    <div id="mini-chat-body" style="display:none">
                        <div id="mini-chat-messages"></div>
                        <div style="display:flex; gap:6px; padding:8px; border-top:1px solid var(--border); background:var(--surface-2); align-items:center">
                            <button type="button" id="mini-chat-photo-btn" title="Send a photo"
                                style="background:#4e4e54;border:none;color:#fff;font-size:0.85rem;cursor:pointer;min-height:36px;min-width:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                                📷
                                <input type="file" accept="image/*" capture="environment" id="mini-chat-photo-input" style="display:none">
                            </button>
                            <input type="text" id="mini-chat-input"
                                placeholder="Ask about this item…"
                                onkeydown="if(event.key==='Enter')sendMiniChat()">
                            <button type="button" onclick="sendMiniChat()"
                                style="background:#A8A6A1;border:none;color:#fff;font-size:0.85rem;cursor:pointer;min-height:36px;min-width:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                                ➤
                            </button>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="display:flex; gap:1.5rem; flex-wrap:wrap; padding-top:0.25rem">
                    <label class="form-check">
                        <input type="checkbox" id="f-is-online">
                        List Online
                    </label>
                    <label class="form-check">
                        <input type="checkbox" id="f-is-tax-exempt">
                        Tax Exempt
                    </label>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary btn-lg" onclick="saveItem()" id="save-btn">Save Item</button>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/assistant-panel.js"></script>
<script>initAssistantPanel('The vendor is managing their inventory items at Bowenstreet Market.');</script>
<script>
    let editingId = null;
    let pendingPhotoFile = null;
    let pendingPhotoBase64 = null;
    let pendingPhotoMime = null;
    let currentRole = 'vendor';
    let allVendors = [];
    let selectedVendorId = null;
    let aiSuggestions = {};
    let miniChatOpen = false;
    let miniChatBusy = false;

    // ── Nav helpers ────────────────────────────────────────────────────
    function handleLogout() { clearToken(); window.location.href = '/vendor/login.html'; }
    function toggleNav() {
        document.getElementById('main-nav').classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
        const nav = document.getElementById('main-nav');
        const btn = document.getElementById('hamburger-btn');
        if (nav && btn && !nav.contains(e.target) && !btn.contains(e.target)) {
            nav.classList.remove('open');
        }
    });

    // ── Photo upload ───────────────────────────────────────────────────
    function triggerPhotoInput() {
        document.getElementById('f-photo').click();
    }

    function onPhotoSelected(event) {
        const file = event.target.files[0];
        if (!file) return;
        pendingPhotoFile = file;
        const reader = new FileReader();
        reader.onload = function(e) {
            const dataUrl = e.target.result;
            pendingPhotoBase64 = dataUrl.split(',')[1];
            pendingPhotoMime = file.type;
            document.getElementById('photo-preview-container').innerHTML = `
                <div class="photo-preview-wrap">
                    <img src="${dataUrl}" alt="Preview">
                    <button type="button" class="photo-preview-remove" onclick="clearPhotoPreview()">✕</button>
                </div>
                <div class="photo-upload-label" style="margin-top:4px">Tap to change photo</div>`;
            document.getElementById('ai-describe-wrap').style.display = 'flex';
            dismissSuggestions();
        };
        reader.readAsDataURL(file);
    }

    function clearPhotoPreview() {
        pendingPhotoFile = null;
        pendingPhotoBase64 = null;
        pendingPhotoMime = null;
        document.getElementById('f-photo').value = '';
        document.getElementById('photo-preview-container').innerHTML = `
            <div class="photo-upload-icon">📷</div>
            <div class="photo-upload-label">Tap to add photo<br><small style="opacity:0.6">Camera or gallery</small></div>`;
        if (!editingId) {
            document.getElementById('ai-describe-wrap').style.display = 'none';
        }
        dismissSuggestions();
    }

    function renderExistingPhotos(photoUrls) {
        const wrap = document.getElementById('existing-photos');
        const list = document.getElementById('existing-photos-list');
        if (!photoUrls || photoUrls.length === 0) {
            wrap.style.display = 'none';
            return;
        }
        wrap.style.display = 'block';
        list.innerHTML = photoUrls.map(url => `
            <div style="position:relative">
                <img src="${url}" style="width:56px;height:56px;object-fit:cover;border:1px solid var(--border)">
                <button type="button" class="photo-preview-remove"
                    onclick="removeExistingPhoto('${url.replace(/'/g, "\\'")}')"
                    style="position:absolute;top:2px;right:2px">✕</button>
            </div>`).join('');
    }

    async function removeExistingPhoto(url) {
        if (!editingId) return;
        try {
            const updated = await apiFetch('DELETE', `/api/v1/items/${editingId}/photo?photo_url=${encodeURIComponent(url)}`);
            renderExistingPhotos(updated.photo_urls);
            await loadItems();
        } catch (e) {
            showAlert('modal-alert', e.message, 'error');
        }
    }

    // ── Label dropdown ─────────────────────────────────────────────────
    function toggleLabelDropdown(event, id) {
        event.stopPropagation();
        document.querySelectorAll('.ldd').forEach(d => {
            if (d.id !== `ldd-${id}`) d.style.display = 'none';
        });
        const ldd = document.getElementById(`ldd-${id}`);
        if (ldd) ldd.style.display = ldd.style.display === 'block' ? 'none' : 'block';
    }
    document.addEventListener('click', () => {
        document.querySelectorAll('.ldd').forEach(d => d.style.display = 'none');
    });

    function printPdfLabel(id) {
        document.querySelectorAll('.ldd').forEach(d => d.style.display = 'none');
        window.open(`/api/v1/items/${id}/label`, '_blank');
    }

    async function printDymoLabel(id) {
        document.querySelectorAll('.ldd').forEach(d => d.style.display = 'none');
        try {
            const xml = await apiFetchText(`/api/v1/items/${id}/dymo-label`);
            const body = new URLSearchParams({ printerName: '', labelXml: xml, labelSetXml: '' });
            const resp = await fetch('http://localhost:41951/DYMO/DLS/Printing/PrintLabel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body.toString(),
            });
            if (resp.ok) {
                showAlert('alert-container', 'Label sent to Dymo printer.', 'success');
            } else {
                showAlert('alert-container', 'Dymo printer error. Check the printer is connected.', 'error');
            }
        } catch (e) {
            if (String(e).includes('fetch') || String(e).includes('Failed')) {
                showAlert('alert-container', 'Dymo software is not running on this computer.', 'error');
            } else {
                showAlert('alert-container', e.message || 'Dymo label failed.', 'error');
            }
        }
    }

    async function printLabelAuto(id, style) {
        if (style === 'dymo') await printDymoLabel(id);
        else printPdfLabel(id);
    }

    // ── Inline photo upload on card ─────────────────────────────────────
    async function uploadCardPhoto(id, input) {
        const file = input.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        const token = sessionStorage.getItem('bmm_token');
        try {
            const res = await fetch(`/api/v1/items/${id}/photo`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData,
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: 'Upload failed' }));
                throw new Error(err.detail || 'Upload failed');
            }
            showAlert('alert-container', 'Photo uploaded.', 'success');
            await loadItems();
        } catch (e) {
            showAlert('alert-container', e.message, 'error');
        }
    }

    // ── Modal ──────────────────────────────────────────────────────────
    function openModal(item = null) {
        editingId = item ? item.id : null;
        pendingPhotoFile = null;
        pendingPhotoBase64 = null;
        pendingPhotoMime = null;
        document.getElementById('modal-title').textContent = item ? 'Edit Item' : 'Add Item';
        document.getElementById('modal-alert').innerHTML = '';
        document.getElementById('f-name').value = item?.name || '';
        document.getElementById('f-category').value = item?.category || '';
        document.getElementById('f-description').value = item?.description || '';
        document.getElementById('f-price').value = item?.price || '';
        document.getElementById('f-quantity').value = item?.quantity ?? 1;
        document.getElementById('f-sale-price').value = item?.sale_price || '';
        document.getElementById('f-sale-start').value = item?.sale_start || '';
        document.getElementById('f-sale-end').value = item?.sale_end || '';
        document.getElementById('f-is-online').checked = item?.is_online || false;
        document.getElementById('f-is-tax-exempt').checked = item?.is_tax_exempt || false;
        document.getElementById('f-label-style').value = item?.label_style || 'standard';

        clearPhotoPreview();
        renderExistingPhotos(item?.photo_urls || []);

        // AI button: always visible in edit mode, hidden in add mode until photo selected
        document.getElementById('ai-describe-wrap').style.display = item ? 'flex' : 'none';
        dismissSuggestions();

        // Reset mini chat
        document.getElementById('mini-chat-messages').innerHTML = '';
        document.getElementById('mini-chat-body').style.display = 'none';
        document.getElementById('mini-chat-arrow').textContent = '▾';
        miniChatOpen = false;

        if (currentRole !== 'vendor') {
            const wrap = document.getElementById('form-vendor-wrap');
            wrap.style.display = 'block';
            const sel = document.getElementById('f-vendor-id');
            if (item) { sel.value = item.vendor_id; sel.disabled = true; }
            else { sel.disabled = false; if (selectedVendorId) sel.value = selectedVendorId; }
        }

        document.getElementById('modal-overlay').classList.remove('hidden');
        setTimeout(() => document.getElementById('f-name').focus(), 100);
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.add('hidden');
        editingId = null;
        pendingPhotoFile = null;
        pendingPhotoBase64 = null;
        pendingPhotoMime = null;
        dismissSuggestions();
        document.getElementById('mini-chat-messages').innerHTML = '';
        document.getElementById('mini-chat-body').style.display = 'none';
        document.getElementById('mini-chat-arrow').textContent = '▾';
        miniChatOpen = false;
    }

    // ── In-form AI assistant ───────────────────────────────────────────

    async function analyzePhotoWithAI() {
        const token = sessionStorage.getItem('bmm_token');
        const btn = document.getElementById('ai-describe-btn');
        const statusEl = document.getElementById('ai-describe-status');
        btn.disabled = true;
        btn.textContent = '✨ Analyzing…';
        statusEl.textContent = '';
        dismissSuggestions();

        const itemName = document.getElementById('f-name').value.trim();
        const itemCat = document.getElementById('f-category').value;
        const formContext = editingId && itemName
            ? `The vendor is editing an item called "${itemName}" in the "${itemCat}" category. Suggest improvements or a fresh description.`
            : 'The vendor is filling out the Add Item form. Analyze the photo and suggest item details.';

        let message, body;
        if (pendingPhotoBase64 && pendingPhotoMime) {
            message = 'Analyze this item photo. Respond ONLY with valid JSON (no markdown, no code fences): {"name":"...","category":"...","description":"...","price_range":"$X-$Y"}. Category must be one of: Jewelry, Furniture, Vintage, Art, Handcrafted, Clothing, Books, Collectibles, Home Decor, Other.';
            body = { message, form_context: formContext, image_base64: pendingPhotoBase64, image_mime_type: pendingPhotoMime };
        } else {
            message = `This item is called "${itemName}" in the "${itemCat}" category. Write an improved 2-3 sentence product description and confirm the best category. Respond ONLY with valid JSON: {"name":"...","category":"...","description":"...","price_range":"$X-$Y"}.`;
            body = { message, form_context: formContext };
        }

        try {
            const res = await fetch('/api/v1/assistant/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'AI unavailable');
            const sugg = parseAISuggestions(data.reply);
            if (sugg) {
                showSuggestions(sugg);
            } else {
                if (!miniChatOpen) toggleMiniChat();
                showMiniChatMessage(data.reply, 'assistant');
            }
        } catch (e) {
            statusEl.textContent = 'AI unavailable. Try again.';
            setTimeout(() => { statusEl.textContent = ''; }, 3000);
        } finally {
            btn.disabled = false;
            btn.textContent = '✨ Describe with AI';
        }
    }

    function parseAISuggestions(reply) {
        const cleaned = reply.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
        const match = cleaned.match(/\{[\s\S]*\}/);
        if (match) {
            try {
                const obj = JSON.parse(match[0]);
                if (obj.name || obj.category || obj.description) return obj;
            } catch (e) {}
        }
        return null;
    }

    function showSuggestions(sugg) {
        aiSuggestions = sugg;
        const fields = [
            { key: 'name', rowId: 'ai-sugg-name', valId: 'ai-sugg-name-val' },
            { key: 'category', rowId: 'ai-sugg-category', valId: 'ai-sugg-category-val' },
            { key: 'description', rowId: 'ai-sugg-description', valId: 'ai-sugg-description-val' },
            { key: 'price_range', rowId: 'ai-sugg-price', valId: 'ai-sugg-price-val' },
        ];
        fields.forEach(({ key, rowId, valId }) => {
            const row = document.getElementById(rowId);
            const valEl = document.getElementById(valId);
            if (sugg[key] && row && valEl) {
                valEl.textContent = sugg[key];
                row.style.display = 'flex';
            } else if (row) {
                row.style.display = 'none';
            }
        });
        document.getElementById('ai-suggestion-panel').style.display = 'block';
    }

    function dismissSuggestions() {
        document.getElementById('ai-suggestion-panel').style.display = 'none';
        aiSuggestions = {};
    }

    function applySuggestion(field) {
        const val = aiSuggestions[field];
        if (!val) return;
        if (field === 'name') {
            document.getElementById('f-name').value = val;
        } else if (field === 'category') {
            const sel = document.getElementById('f-category');
            const opts = Array.from(sel.options);
            const match = opts.find(o => o.value.toLowerCase() === val.toLowerCase()) ||
                          opts.find(o => val.toLowerCase().includes(o.value.toLowerCase()) && o.value !== '');
            if (match) sel.value = match.value;
        } else if (field === 'description') {
            document.getElementById('f-description').value = val;
        }
    }

    function applyAllSuggestions() {
        if (aiSuggestions.name) applySuggestion('name');
        if (aiSuggestions.category) applySuggestion('category');
        if (aiSuggestions.description) applySuggestion('description');
        dismissSuggestions();
    }

    // ── Mini chat ──────────────────────────────────────────────────────

    function toggleMiniChat() {
        miniChatOpen = !miniChatOpen;
        document.getElementById('mini-chat-body').style.display = miniChatOpen ? 'block' : 'none';
        document.getElementById('mini-chat-arrow').textContent = miniChatOpen ? '▴' : '▾';
        if (miniChatOpen) document.getElementById('mini-chat-input').focus();
    }

    function showMiniChatMessage(text, type) {
        const msgs = document.getElementById('mini-chat-messages');
        const el = document.createElement('div');
        el.className = type === 'user' ? 'mc-msg-user' : 'mc-msg-assistant';
        el.textContent = text;
        msgs.appendChild(el);
        msgs.scrollTop = msgs.scrollHeight;
    }

    async function sendMiniChat() {
        if (miniChatBusy) return;
        const input = document.getElementById('mini-chat-input');
        const msg = input.value.trim();
        if (!msg) return;
        miniChatBusy = true;
        input.value = '';
        showMiniChatMessage(msg, 'user');

        const itemName = document.getElementById('f-name').value.trim();
        const itemCat = document.getElementById('f-category').value;
        let formContext = 'The vendor is filling out the Add Item form.';
        if (editingId && itemName) {
            formContext = `The vendor is editing an item called "${itemName}" in the "${itemCat}" category.`;
        } else if (itemName) {
            formContext = `The vendor is adding a new item called "${itemName}" to the "${itemCat}" category.`;
        }

        const token = sessionStorage.getItem('bmm_token');
        try {
            const res = await fetch('/api/v1/assistant/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ message: msg, form_context: formContext }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Unavailable');
            showMiniChatMessage(data.reply, 'assistant');
        } catch (e) {
            showMiniChatMessage('Assistant is not available right now.', 'assistant');
        }
        miniChatBusy = false;
    }

    // Mini chat photo button
    document.getElementById('mini-chat-photo-btn').addEventListener('click', function () {
        document.getElementById('mini-chat-photo-input').click();
    });
    document.getElementById('mini-chat-photo-input').addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (ev) {
            const base64 = ev.target.result.split(',')[1];
            const mime = file.type;
            showMiniChatMessage('[Photo sent]', 'user');
            const itemName = document.getElementById('f-name').value.trim();
            const itemCat = document.getElementById('f-category').value;
            const formContext = editingId && itemName
                ? `The vendor is editing "${itemName}" in the "${itemCat}" category.`
                : 'The vendor is filling out the Add Item form.';
            const token = sessionStorage.getItem('bmm_token');
            fetch('/api/v1/assistant/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ message: 'What is this item? Suggest a name, category, and description.', image_base64: base64, image_mime_type: mime, form_context: formContext }),
            }).then(r => r.json()).then(data => {
                showMiniChatMessage(data.reply || 'No response.', 'assistant');
            }).catch(() => {
                showMiniChatMessage('Assistant is not available right now.', 'assistant');
            });
        };
        reader.readAsDataURL(file);
        e.target.value = '';
    });

    async function saveItem() {
        const name = document.getElementById('f-name').value.trim();
        const price = parseFloat(document.getElementById('f-price').value);
        if (!name || isNaN(price)) {
            showAlert('modal-alert', 'Name and price are required.', 'error');
            return;
        }

        const body = {
            name,
            category: document.getElementById('f-category').value || null,
            description: document.getElementById('f-description').value || null,
            price,
            quantity: parseInt(document.getElementById('f-quantity').value) || 1,
            sale_price: parseFloat(document.getElementById('f-sale-price').value) || null,
            sale_start: document.getElementById('f-sale-start').value || null,
            sale_end: document.getElementById('f-sale-end').value || null,
            is_online: document.getElementById('f-is-online').checked,
            is_tax_exempt: document.getElementById('f-is-tax-exempt').checked,
            label_style: document.getElementById('f-label-style').value,
        };

        if (currentRole !== 'vendor' && !editingId) {
            const vid = document.getElementById('f-vendor-id').value;
            if (!vid) { showAlert('modal-alert', 'Please select a vendor.', 'error'); return; }
            body.vendor_id = parseInt(vid);
        }

        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.textContent = 'Saving…';
        try {
            let savedItem;
            if (editingId) {
                savedItem = await apiPut(`/api/v1/items/${editingId}`, body);
                showAlert('alert-container', 'Item updated.', 'success');
            } else {
                savedItem = await apiPost('/api/v1/items/', body);
                showAlert('alert-container', 'Item created.', 'success');
            }

            if (pendingPhotoFile && savedItem && savedItem.id) {
                const formData = new FormData();
                formData.append('file', pendingPhotoFile);
                const token = sessionStorage.getItem('bmm_token');
                try {
                    await fetch(`/api/v1/items/${savedItem.id}/photo`, {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token },
                        body: formData,
                    });
                } catch (photoErr) {
                    showAlert('alert-container', 'Item saved but photo upload failed.', 'warning');
                }
            }

            closeModal();
            await loadItems();
        } catch (err) {
            showAlert('modal-alert', err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Save Item';
        }
    }

    // ── Delete ─────────────────────────────────────────────────────────
    async function deleteItem(id, name) {
        if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
        try {
            await apiDelete(`/api/v1/items/${id}`);
            showAlert('alert-container', 'Item removed.', 'success');
            await loadItems();
        } catch (err) {
            showAlert('alert-container', err.message, 'error');
        }
    }

    // ── Vendor filter ──────────────────────────────────────────────────
    async function loadVendors() {
        try {
            allVendors = await apiGet('/api/v1/vendors/');
            const sel = document.getElementById('vendor-filter');
            const fSel = document.getElementById('f-vendor-id');
            allVendors.filter(v => v.role === 'vendor').forEach(v => {
                const opt = `<option value="${v.id}">${v.name} (${v.booth_number || 'No Booth'})</option>`;
                sel.innerHTML += opt;
                fSel.innerHTML += opt;
            });
        } catch (e) { /* ignore */ }
    }

    function onVendorChange() {
        const val = document.getElementById('vendor-filter').value;
        selectedVendorId = val ? parseInt(val) : null;
        loadItems();
    }

    // ── Render items ───────────────────────────────────────────────────
    function statusBadge(s) {
        const map = { active: 'badge-green', sold: 'badge-blue', removed: 'badge-red' };
        return `<span class="badge ${map[s] || 'badge-gray'}">${s}</span>`;
    }

    function labelBadge(style) {
        return style === 'dymo'
            ? `<span class="badge badge-blue">Dymo</span>`
            : `<span class="badge badge-gray">PDF</span>`;
    }

    function renderItems(items) {
        const grid = document.getElementById('items-grid');
        const today = new Date().toISOString().split('T')[0];

        if (items.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1" class="card">
                <div class="empty-state">No items yet. Tap <strong>+ Add Item</strong> to get started.</div>
            </div>`;
            return;
        }

        grid.innerHTML = items.map(item => {
            const isOnSale = item.sale_price && item.sale_start && item.sale_end &&
                item.sale_start <= today && today <= item.sale_end;
            const priceHtml = isOnSale
                ? `<span class="price-original">$${parseFloat(item.price).toFixed(2)}</span> <span class="price-sale">$${parseFloat(item.sale_price).toFixed(2)}</span>`
                : `$${parseFloat(item.price).toFixed(2)}`;

            const photoHtml = (item.photo_urls && item.photo_urls.length)
                ? `<img src="${item.photo_urls[0]}" alt="">`
                : `🏷️`;

            const vendorMeta = currentRole !== 'vendor' && item.booth_number
                ? ` &middot; Booth ${item.booth_number}` : '';

            const style = item.label_style || 'standard';
            const labelBtnText = style === 'dymo' ? 'Dymo' : 'Label';
            const itemJson = JSON.stringify(item).replace(/"/g, '&quot;');

            return `<div class="item-card">
                <div class="item-card-top">
                    <div class="item-card-photo">${photoHtml}</div>
                    <div class="item-card-info">
                        <div class="item-card-name">${item.name}</div>
                        <div class="item-card-price">${priceHtml}</div>
                        <div class="item-card-meta">${item.category || '—'} &middot; Qty: ${item.quantity}${vendorMeta}</div>
                        <div style="margin-top:4px">${statusBadge(item.status)} ${labelBadge(style)}</div>
                    </div>
                </div>
                <div class="item-card-actions">
                    <button class="btn btn-outline" onclick="openModal(${itemJson})">Edit</button>
                    <div class="label-btn-wrap" onclick="event.stopPropagation()" style="flex:1;display:flex">
                        <button class="btn btn-secondary label-btn-main" style="flex:1;border-radius:0"
                            onclick="printLabelAuto(${item.id}, '${style}')">${labelBtnText}</button>
                        <button class="btn btn-secondary label-btn-toggle"
                            onclick="toggleLabelDropdown(event, ${item.id})">▾</button>
                        <div class="ldd" id="ldd-${item.id}">
                            <button onclick="printPdfLabel(${item.id})">PDF Label</button>
                            <button onclick="printDymoLabel(${item.id})">Dymo Label</button>
                        </div>
                    </div>
                    <button class="btn btn-danger" onclick="deleteItem(${item.id}, '${item.name.replace(/'/g, "\\'").replace(/"/g, '\\"')}')">Del</button>
                </div>
                <div class="item-card-photos">
                    ${(item.photo_urls || []).slice(1).map(url =>
                        `<img src="${url}" alt="" onclick="window.open('${url}','_blank')">`
                    ).join('')}
                    <button class="add-photo-btn" title="Add photo" type="button">
                        <span style="pointer-events:none">+📷</span>
                        <input type="file" accept="image/*" capture="environment"
                            onchange="uploadCardPhoto(${item.id}, this)">
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    async function loadItems() {
        try {
            let url = '/api/v1/items/';
            if (currentRole !== 'vendor' && selectedVendorId) url += `?vendor_id=${selectedVendorId}`;
            const items = await apiGet(url);
            renderItems(items);
        } catch (err) {
            showAlert('alert-container', err.message, 'error');
        }
    }

    // ── Init ───────────────────────────────────────────────────────────
    async function init() {
        const token = sessionStorage.getItem('bmm_token');
        if (!token) { window.location.href = '/vendor/login.html'; return; }
        const payload = parseToken();
        if (!payload) { window.location.href = '/vendor/login.html'; return; }

        currentRole = payload.role;
        document.getElementById('vendor-name').textContent = payload.name || 'User';

        if (currentRole === 'admin' || currentRole === 'cashier') {
            const homeHref = currentRole === 'admin' ? '/admin/index.html' : '/pos/index.html';
            document.getElementById('nav-brand').href = homeHref;
            document.getElementById('nav-role-label').textContent = currentRole === 'admin' ? 'Admin' : 'Cashier';
            document.getElementById('nav-home').href = homeHref;
            document.getElementById('nav-home').textContent = currentRole === 'admin' ? 'Admin Dashboard' : 'POS Terminal';
            document.getElementById('vendor-filter-wrap').style.display = 'flex';
            document.getElementById('page-title').textContent = 'Item Management';
            document.getElementById('bottom-nav').style.display = 'none';
            document.body.classList.remove('has-bottom-nav');
            await loadVendors();
        } else {
            document.getElementById('nav-brand').href = '/vendor/dashboard.html';
            document.getElementById('nav-home').href = '/vendor/dashboard.html';
            document.getElementById('nav-home').textContent = 'Dashboard';
            document.getElementById('bottom-nav').style.display = '';
            document.getElementById('page-title').textContent = 'My Items';
        }

        await loadItems();
    }

    init();
</script>
</body>
