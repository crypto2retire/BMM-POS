<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Register — BMM-POS</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        body {
            overflow: hidden;
            background: #38383B;
            background-image:
                radial-gradient(ellipse at 15% 0%, rgba(201,169,110,0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 100%, rgba(168,166,161,0.03) 0%, transparent 55%);
            background-attachment: fixed;
        }

        .reg-layout {
            display: flex;
            height: calc(100vh - 56px);
            overflow: hidden;
        }

        /* LEFT PANEL -- search & results */
        .reg-left {
            flex: 0 0 60%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(201,169,110,0.12);
            background: #38383B;
            overflow: hidden;
        }

        .search-bar-wrap {
            padding: 1rem;
            border-bottom: 1px solid rgba(201,169,110,0.1);
            background: #2e2e31;
        }

        .search-bar-wrap input {
            width: 100%;
            padding: 0.65rem 1rem;
            font-size: 1rem;
            border: 1px solid #555558;
            border-radius: 0;
            outline: none;
            transition: border-color 0.15s;
            background: #44444A;
            color: #F0EDE8;
            font-family: 'Roboto', sans-serif;
        }
        .search-bar-wrap input:focus { border-color: rgba(201,169,110,0.5); background: #4e4e54; box-shadow: 0 0 0 2px rgba(201,169,110,0.1); }
        .search-bar-wrap input::placeholder { color: #A8A6A1; opacity: 0.7; }
        .search-bar-wrap .search-hint {
            font-size: 0.75rem;
            color: #A8A6A1;
            margin-top: 0.4rem;
        }

        .results-area {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.6rem;
            align-content: start;
        }

        .results-empty {
            grid-column: 1 / -1;
            text-align: center;
            color: #A8A6A1;
            padding: 3rem 1rem;
            font-size: 0.9rem;
            font-family: 'EB Garamond', serif;
            font-style: italic;
        }

        .item-card {
            background: #44444A;
            border: 1px solid rgba(201,169,110,0.1);
            border-radius: 0;
            padding: 0.75rem;
            cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .item-card:hover {
            border-color: rgba(201,169,110,0.35);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transform: translateY(-1px);
        }
        .item-card:active { transform: translateY(0); }
        .item-card .ic-name {
            font-weight: 500;
            font-size: 0.88rem;
            color: #F0EDE8;
            line-height: 1.3;
            font-family: 'EB Garamond', serif;
        }
        .item-card .ic-booth {
            font-size: 0.72rem;
            color: #A8A6A1;
            font-family: 'Roboto', sans-serif;
            letter-spacing: 0.03em;
        }
        .item-card .ic-price-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.25rem;
        }
        .item-card .ic-price {
            font-size: 0.95rem;
            font-weight: 500;
            color: #C9A96E;
            font-family: 'EB Garamond', serif;
        }
        .item-card .ic-price-orig {
            font-size: 0.8rem;
            color: #A8A6A1;
            text-decoration: line-through;
        }
        .item-card .ic-sale-badge {
            font-size: 0.6rem;
            font-weight: 600;
            color: #1e1e20;
            background: #e8a060;
            padding: 0.1rem 0.35rem;
            border-radius: 0;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-family: 'Roboto', sans-serif;
        }
        .item-card .ic-barcode {
            font-size: 0.7rem;
            color: #777;
            font-family: 'Roboto Mono', monospace;
        }

        /* RIGHT PANEL -- cart */
        .reg-right {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            background: #2e2e31;
            overflow: hidden;
        }

        .cart-header {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid rgba(201,169,110,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e20;
            color: #F0EDE8;
        }
        .cart-header h2 {
            font-size: 1rem;
            font-weight: 500;
            font-family: 'EB Garamond', serif;
            font-style: italic;
            letter-spacing: 0.02em;
        }
        .cart-header .cart-count {
            font-size: 0.72rem;
            background: rgba(201,169,110,0.15);
            border: 1px solid rgba(201,169,110,0.2);
            color: #C9A96E;
            padding: 0.2rem 0.6rem;
            border-radius: 0;
            font-family: 'Roboto', sans-serif;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }

        .cart-empty {
            text-align: center;
            color: #A8A6A1;
            padding: 2.5rem 1rem;
            font-size: 0.9rem;
            font-family: 'EB Garamond', serif;
            font-style: italic;
        }

        .cart-row {
            display: flex;
            align-items: center;
            padding: 0.5rem 0.75rem;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(201,169,110,0.06);
            transition: background 0.1s;
        }
        .cart-row:hover { background: rgba(201,169,110,0.03); }
        .cart-row-info { flex: 1; min-width: 0; }
        .cart-row-name {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #F0EDE8;
            font-family: 'EB Garamond', serif;
        }
        .cart-row-sub {
            font-size: 0.72rem;
            color: #A8A6A1;
        }
        .cart-qty-controls {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .qty-btn {
            width: 22px; height: 22px;
            border: 1px solid #555558;
            border-radius: 0;
            background: #44444A;
            color: #F0EDE8;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.1s;
        }
        .qty-btn:hover { background: #5a5a62; }
        .qty-display {
            font-size: 0.85rem;
            font-weight: 600;
            min-width: 1.5rem;
            text-align: center;
            color: #F0EDE8;
        }
        .cart-row-price {
            font-size: 0.85rem;
            font-weight: 500;
            color: #F0EDE8;
            min-width: 4rem;
            text-align: right;
            font-family: 'EB Garamond', serif;
        }
        .remove-btn {
            border: none;
            background: none;
            color: #777;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.15rem 0.25rem;
            border-radius: 0;
            line-height: 1;
            transition: color 0.1s, background 0.1s;
        }
        .remove-btn:hover { color: #c87070; background: rgba(200,112,112,0.1); }

        /* TOTALS */
        .totals-section {
            border-top: 1px solid rgba(201,169,110,0.2);
            padding: 0.75rem 1rem 0;
        }
        .totals-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 0.35rem;
            color: #d8d4cc;
        }
        .totals-row.total-bold {
            font-size: 1.25rem;
            font-weight: 500;
            border-top: 1px solid rgba(201,169,110,0.2);
            padding-top: 0.5rem;
            margin-top: 0.2rem;
            color: #F0EDE8;
            font-family: 'EB Garamond', serif;
        }

        /* PAYMENT SECTION */
        .payment-section {
            padding: 0.75rem 1rem;
            border-top: 1px solid rgba(201,169,110,0.1);
        }
        .payment-label {
            font-size: 0.65rem;
            font-weight: 400;
            color: #A8A6A1;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.4rem;
            font-family: 'Roboto', sans-serif;
        }
        .payment-btns {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
        }
        .pay-btn {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #555558;
            border-radius: 0;
            background: #44444A;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            color: #A8A6A1;
            font-family: 'Roboto', sans-serif;
        }
        .pay-btn:hover { border-color: rgba(201,169,110,0.4); color: #C9A96E; }
        .pay-btn.active {
            border-color: rgba(201,169,110,0.4);
            background: rgba(201,169,110,0.1);
            color: #C9A96E;
        }

        .cash-input-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 0.4rem;
        }
        .cash-input-row label {
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            color: #A8A6A1;
        }
        .cash-input-row input {
            flex: 1;
            padding: 0.45rem 0.6rem;
            font-size: 0.9rem;
            border: 1px solid #555558;
            border-radius: 0;
            outline: none;
            background: #44444A;
            color: #F0EDE8;
        }
        .cash-input-row input:focus { border-color: rgba(201,169,110,0.5); }
        .change-display {
            font-size: 0.9rem;
            font-weight: 700;
            color: #7BC4A0;
            text-align: right;
            min-height: 1.4rem;
        }

        /* CHARGE BUTTON */
        .charge-wrap {
            padding: 0.6rem 1rem 0.75rem;
        }
        .btn-charge {
            width: 100%;
            padding: 0.9rem;
            font-size: 0.85rem;
            font-weight: 500;
            background: #C9A96E;
            color: #1e1e20;
            border: none;
            border-radius: 0;
            cursor: pointer;
            transition: background 0.15s;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'Roboto', sans-serif;
            box-shadow: 0 2px 0 rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .btn-charge:hover:not(:disabled) { background: #b8954f; }
        .btn-charge:disabled { opacity: 0.4; cursor: not-allowed; }

        /* SUCCESS OVERLAY */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.78);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        .overlay.show { display: flex; }
        .receipt-card {
            background: #44444A;
            border: 1px solid rgba(201,169,110,0.25);
            border-radius: 0;
            width: 420px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            color: #F0EDE8;
        }
        .receipt-card h2 {
            font-size: 1.2rem;
            font-weight: 500;
            color: #C9A96E;
            margin-bottom: 0.25rem;
            font-family: 'EB Garamond', serif;
            font-style: italic;
        }
        .receipt-card .receipt-time {
            font-size: 0.75rem;
            color: #A8A6A1;
            margin-bottom: 1rem;
        }
        .receipt-items { margin-bottom: 1rem; }
        .receipt-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            padding: 0.25rem 0;
            border-bottom: 1px dashed rgba(201,169,110,0.12);
            color: #d8d4cc;
        }
        .receipt-totals { margin-top: 0.5rem; }
        .receipt-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 0.2rem 0;
            color: #d8d4cc;
        }
        .receipt-total-row.bold {
            font-weight: 500;
            font-size: 1.1rem;
            border-top: 1px solid rgba(201,169,110,0.2);
            padding-top: 0.4rem;
            margin-top: 0.2rem;
            color: #F0EDE8;
            font-family: 'EB Garamond', serif;
        }
        .change-big {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 500;
            color: #7BC4A0;
            margin: 0.75rem 0;
            padding: 0.6rem;
            background: rgba(20,122,84,0.15);
            border: 1px solid rgba(123,196,160,0.2);
            border-radius: 0;
            font-family: 'EB Garamond', serif;
        }
        .receipt-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .receipt-actions button {
            flex: 1;
            padding: 0.65rem;
            font-size: 0.78rem;
            font-weight: 500;
            border-radius: 0;
            cursor: pointer;
            border: none;
            font-family: 'Roboto', sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .btn-new-sale {
            background: #C9A96E;
            color: #1e1e20;
        }
        .btn-new-sale:hover { background: #b8954f; }
        .btn-print {
            background: #4e4e54;
            border: 1px solid rgba(201,169,110,0.15) !important;
            color: #A8A6A1;
        }
        .btn-print:hover { background: #5a5a62; color: #F0EDE8; }

        /* Navbar store name override */
        .navbar .store-name {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        @media print {
            .overlay, .overlay * { display: block !important; }
            .navbar, .reg-left, .reg-right, .receipt-actions { display: none !important; }
            .receipt-card { box-shadow: none; width: 80mm; padding: 4mm; margin: 0; background: #fff; color: #000; }
        }
    </style>

</head>

<div class="reg-layout">
    <!-- LEFT: Search -->
    <div class="reg-left">
        <div class="search-bar-wrap">
            <input type="text" id="search-input" placeholder="Type item name, scan barcode, or enter SKU…" autocomplete="off" autofocus />

            <div class="cart-empty">Cart is empty</div>
        </div>

        <div class="totals-section">

                <span>Subtotal</span>
                <span id="t-subtotal">$0.00</span>

            <div class="totals-row">
                <span>Tax (5.5%)</span>
                <span id="t-tax">$0.00</span>

<!-- Success Overlay -->

    <div class="receipt-card" id="receipt-card">

<script src="/static/js/api.js"></script>
<script>
    const TAX_RATE = 0.055;

    let cart = [];
    let paymentMethod = 'cash';
    let searchTimer = null;

    function handleLogout() {
        clearToken();
        window.location.href = "/vendor/login.html";
    }

    function getActivePrice(item) {
        if (item.sale_price && item.sale_start && item.sale_end) {
            const today = new Date().toISOString().split('T')[0];
            if (today >= item.sale_start && today <= item.sale_end) {
                return parseFloat(item.sale_price);
            }
        }
        return parseFloat(item.price);
    }

    function isOnSale(item) {
        if (!item.sale_price || !item.sale_start || !item.sale_end) return false;
        const today = new Date().toISOString().split('T')[0];
        return today >= item.sale_start && today <= item.sale_end;
    }

    function fmt(n) { return '$' + parseFloat(n).toFixed(2); }

    // ── Search ─────────────────────────────────────────────────────────
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        const q = searchInput.value.trim();
        if (!q) { showResultsPlaceholder(); return; }
        searchTimer = setTimeout(() => doSearch(q), 280);
    });

    searchInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            clearTimeout(searchTimer);
            const q = searchInput.value.trim();
            if (!q) return;
            const items = await searchItems(q);
            if (items.length === 1) {
                addToCart(items[0]);
                searchInput.value = '';
                showResultsPlaceholder();
            } else {
                renderResults(items);
            }
        }
    });

    async function searchItems(q) {
        try {
            return await apiGet(`/api/v1/items/?status=active&limit=40&q=${encodeURIComponent(q)}`);
        } catch (e) {
            return [];
        }
    }

    async function doSearch(q) {
        const items = await searchItems(q);
        renderResults(items);
    }

    function showResultsPlaceholder() {
        document.getElementById('results-area').innerHTML =
            '<div class="results-empty">Search for items above to begin a sale.</div>';
    }

    function renderResults(items) {
        const area = document.getElementById('results-area');
        if (!items || items.length === 0) {
            area.innerHTML = '<div class="results-empty">No active items found.</div>';
            return;
        }
        area.innerHTML = items.map(item => {
            const active = getActivePrice(item);
            const onSale = isOnSale(item);
            const priceHtml = onSale
                ? `<span class="ic-price">${fmt(active)}</span>
                   <span class="ic-price-orig">${fmt(item.price)}</span>
                   <span class="ic-sale-badge">SALE</span>`
                : `<span class="ic-price">${fmt(active)}</span>`;
            return `
                <div class="item-card" onclick='addToCartById(${item.id})' data-item='${JSON.stringify(item).replace(/'/g, "&#39;")}'>
                    <div class="ic-name">${item.name}</div>
                    <div class="ic-booth">${item.booth_number ? 'Booth ' + item.booth_number : 'No booth'}</div>
                    <div class="ic-price-row">${priceHtml}</div>
                    <div class="ic-barcode">${item.barcode}</div>
                </div>`;
        }).join('');
    }

    function addToCartById(itemId) {
        const card = document.querySelector(`.item-card[onclick*="addToCartById(${itemId})"]`);
        if (!card) return;
        try {
            const raw = card.getAttribute('data-item');
            const item = JSON.parse(raw.replace(/&#39;/g, "'"));
            addToCart(item);
        } catch(e) {}
    }

    // ── Cart ───────────────────────────────────────────────────────────
    function addToCart(item) {
        const existing = cart.find(c => c.barcode === item.barcode);
        if (existing) {
            if (existing.qty < item.quantity) {
                existing.qty++;
            } else {
                showRegAlert(`Only ${item.quantity} in stock`, 'warning');
                return;
            }
        } else {
            if (item.quantity < 1) {
                showRegAlert(`${item.name} is out of stock`, 'error');
                return;
            }
            cart.push({
                barcode: item.barcode,
                name: item.name,
                booth: item.booth_number,
                price: getActivePrice(item),
                origPrice: parseFloat(item.price),
                onSale: isOnSale(item),
                isTaxExempt: item.is_tax_exempt,
                maxQty: item.quantity,
                qty: 1,
            });
        }
        renderCart();
    }

    function removeFromCart(barcode) {
        cart = cart.filter(c => c.barcode !== barcode);
        renderCart();
    }

    function changeQty(barcode, delta) {
        const row = cart.find(c => c.barcode === barcode);
        if (!row) return;
        const newQty = row.qty + delta;
        if (newQty < 1) { removeFromCart(barcode); return; }
        if (newQty > row.maxQty) {
            showRegAlert(`Only ${row.maxQty} in stock`, 'warning');
            return;
        }
        row.qty = newQty;
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        const count = cart.reduce((s, r) => s + r.qty, 0);
        document.getElementById('cart-count').textContent = count + (count === 1 ? ' item' : ' items');

        if (cart.length === 0) {
            container.innerHTML = '<div class="cart-empty">Cart is empty</div>';
        } else {
            container.innerHTML = cart.map(row => `
                <div class="cart-row">
                    <div class="cart-row-info">
                        <div class="cart-row-name">${row.name}</div>
                        <div class="cart-row-sub">${row.onSale ? '<span style="color:var(--danger)">SALE</span> · ' : ''}${row.booth ? 'Booth ' + row.booth : ''}</div>
                    </div>
                    <div class="cart-qty-controls">
                        <button class="qty-btn" onclick="changeQty('${row.barcode}', -1)">−</button>
                        <span class="qty-display">${row.qty}</span>
                        <button class="qty-btn" onclick="changeQty('${row.barcode}', 1)">+</button>
                    </div>
                    <div class="cart-row-price">${fmt(row.price * row.qty)}</div>
                    <button class="remove-btn" onclick="removeFromCart('${row.barcode}')" title="Remove">×</button>
                </div>
            `).join('');
        }

        updateTotals();
    }

    function calcTotals() {
        const subtotal = cart.reduce((s, r) => s + r.price * r.qty, 0);
        const taxable = cart.reduce((s, r) => s + (r.isTaxExempt ? 0 : r.price * r.qty), 0);
        const tax = taxable * TAX_RATE;
        const total = subtotal + tax;
        return { subtotal, tax, total };
    }

    function updateTotals() {
        const { subtotal, tax, total } = calcTotals();
        document.getElementById('t-subtotal').textContent = fmt(subtotal);
        document.getElementById('t-tax').textContent = fmt(tax);
        document.getElementById('t-total').textContent = fmt(total);
        document.getElementById('charge-btn').textContent = `Charge ${fmt(total)}`;
        document.getElementById('charge-btn').disabled = cart.length === 0;
        updateChange();
    }

    function selectPayment(method) {
        paymentMethod = method;
        document.getElementById('pay-cash').classList.toggle('active', method === 'cash');
        document.getElementById('pay-card').classList.toggle('active', method === 'card');
        document.getElementById('cash-fields').style.display = method === 'cash' ? '' : 'none';
        updateChange();
    }

    function updateChange() {
        if (paymentMethod !== 'cash') {
            document.getElementById('change-display').textContent = '';
            return;
        }
        const { total } = calcTotals();
        const tendered = parseFloat(document.getElementById('cash-tendered').value) || 0;
        const change = tendered - total;
        const el = document.getElementById('change-display');
        if (tendered === 0) {
            el.textContent = '';
        } else if (change < 0) {
            el.style.color = 'var(--danger)';
            el.textContent = `Short ${fmt(Math.abs(change))}`;
        } else {
            el.style.color = 'var(--success)';
            el.textContent = `Change: ${fmt(change)}`;
        }
    }

    // ── Charge ─────────────────────────────────────────────────────────
    async function doCharge() {
        if (cart.length === 0) return;
        const { total } = calcTotals();
        const btn = document.getElementById('charge-btn');

        if (paymentMethod === 'cash') {
            const tendered = parseFloat(document.getElementById('cash-tendered').value) || 0;
            if (tendered < total) {
                showRegAlert('Cash tendered is less than total', 'error');
                return;
            }
        }

        btn.disabled = true;
        btn.textContent = 'Processing…';

        const payload = {
            items: cart.map(r => ({ barcode: r.barcode, quantity: r.qty })),
            payment_method: paymentMethod,
        };
        if (paymentMethod === 'cash') {
            payload.cash_tendered = parseFloat(document.getElementById('cash-tendered').value);
        }

        try {
            const sale = await apiPost('/api/v1/pos/sale', payload);
            showSuccess(sale);
        } catch (err) {
            showRegAlert(err.message, 'error');
            btn.disabled = false;
            btn.textContent = `Charge ${fmt(total)}`;
        }
    }

    function showSuccess(sale) {
        const items = sale.line_items || [];
        document.getElementById('receipt-time').textContent =
            new Date(sale.created_at).toLocaleString();

        document.getElementById('receipt-items').innerHTML = items.map(li =>
            `<div class="receipt-item">
                <span>${li.item_name} × ${li.quantity}</span>
                <span>${fmt(li.line_total)}</span>
            </div>`
        ).join('');

        document.getElementById('receipt-totals').innerHTML = `
            <div class="receipt-total-row"><span>Subtotal</span><span>${fmt(sale.subtotal)}</span></div>
            <div class="receipt-total-row"><span>Tax</span><span>${fmt(sale.tax_amount)}</span></div>
            <div class="receipt-total-row bold"><span>Total</span><span>${fmt(sale.total)}</span></div>
            ${sale.payment_method === 'cash' ? `<div class="receipt-total-row"><span>Cash Given</span><span>${fmt(sale.cash_tendered)}</span></div>` : ''}
        `;

        const changeBig = document.getElementById('change-big');
        if (sale.change_given !== null && sale.change_given !== undefined) {
            changeBig.textContent = `Change: ${fmt(sale.change_given)}`;
            changeBig.style.display = '';
        } else {
            changeBig.style.display = 'none';
        }

        document.getElementById('success-overlay').classList.add('show');
    }

    function newSale() {
        cart = [];
        document.getElementById('cash-tendered').value = '';
        document.getElementById('change-display').textContent = '';
        document.getElementById('success-overlay').classList.remove('show');
        searchInput.value = '';
        showResultsPlaceholder();
        renderCart();
        searchInput.focus();
    }

    function showRegAlert(msg, type) {
        const el = document.getElementById('alert-reg');
        el.innerHTML = `<div class="alert alert-${type}" style="font-size:0.8rem;padding:0.4rem 0.7rem;margin-top:0.4rem;">${msg}</div>`;
        setTimeout(() => { el.innerHTML = ''; }, 4000);
    }

    // ── Init ───────────────────────────────────────────────────────────
    function init() {
        const token = sessionStorage.getItem('bmm_token');
        if (!token) { window.location.href = '/vendor/login.html'; return; }
        const payload = parseToken();
        if (!payload || (payload.role !== 'admin' && payload.role !== 'cashier')) {
            window.location.href = '/vendor/dashboard.html';
            return;
        }
        document.getElementById('nav-cashier').textContent = payload.name || payload.role;
        selectPayment('cash');
        renderCart();
    }

    init();
</script>
</body>
</html>
